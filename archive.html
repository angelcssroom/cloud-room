<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cross Room</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;
  --card:#fff;
  --text:#171717;
  --sub:#666b72;
  --muted:#9da2a9;
  --line:#ececec;
  --soft:#fafafa;
  --shadow:0 4px 14px rgba(0,0,0,.038);
  --radius:12px;
}
html,body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Hiragino Sans GB","PingFang SC",Arial,sans-serif;
  font-weight:400;
}
body{
  padding:24px 16px 44px;
}
.main{
  max-width:680px;
  margin:0 auto;
}
.shell{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.header{
  padding:16px 17px 18px;
}
.back{
  display:inline-flex;
  text-decoration:none;
  color:var(--sub);
  font-size:10.5px;
  line-height:1.4;
  margin-bottom:13px;
  font-weight:430;
}
.archive-title{
  margin:0;
  font-size:20px;
  line-height:1.18;
  letter-spacing:-.025em;
  font-weight:650;
}
.archive-sub{
  margin:10px 0 0;
  color:var(--sub);
  font-size:11px;
  line-height:1.72;
  font-weight:430;
}
.search-card{
  padding:12px;
}
.search-row{
  display:flex;
  gap:8px;
}
#themeSearch{
  flex:1;
  height:36px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  padding:0 12px;
  outline:none;
  color:var(--text);
  font-size:11.5px;
  font-family:inherit;
  font-weight:400;
}
#themeSearch::placeholder{
  color:#b3b7bd;
  font-size:11px;
}
.clear-btn{
  width:54px;
  height:36px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fbfbfb;
  color:#858a91;
  font-size:10.5px;
  font-weight:560;
  font-family:inherit;
}
.result-count{
  margin:8px 0 0 4px;
  color:var(--muted);
  font-size:10px;
  letter-spacing:.03em;
  font-weight:520;
}
.theme-card{
  padding:16px 17px 17px;
}
.theme-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.theme-name{
  margin:0;
  font-size:18px;
  font-weight:650;
  letter-spacing:-.025em;
  line-height:1.18;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","PingFang SC",Arial,sans-serif;
}
.theme-alt{
  margin:7px 0 0;
  color:var(--sub);
  font-size:11px;
  line-height:1.45;
  font-weight:500;
}
.theme-no{
  font-size:10.5px;
  color:var(--muted);
  font-family:Georgia,"Times New Roman",serif;
  padding-top:2px;
}
.keywords{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:13px;
}
.keyword{
  padding:4.5px 8px;
  border-radius:999px;
  background:#fbfbfb;
  border:1px solid var(--line);
  color:#777d85;
  font-size:10px;
  line-height:1.2;
  font-weight:520;
}
.micro{
  margin-top:12px;
  color:#747980;
  font-size:11px;
  line-height:1.72;
  font-weight:430;
}
.preview-image-wrap{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  overflow:hidden;
}
.preview-image-wrap img{
  display:block;
  width:100%;
  height:auto;
  filter:saturate(.96) brightness(1.01);
}
.preview-missing{
  margin-top:14px;
  border:1px dashed #dfe3e8;
  border-radius:12px;
  background:#fbfbfb;
  color:#a4abb4;
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:11px;
  line-height:1.7;
  font-weight:430;
  padding:18px;
}
.action-row{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}
.btn{
  appearance:none;
  border:none;
  border-radius:999px;
  min-height:36px;
  padding:0 14px;
  font-size:11px;
  line-height:1.2;
  font-weight:620;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:inherit;
}
.btn.copy{
  background:#171717;
  color:#fff;
  flex:1;
}
.btn.open{
  background:#fbfbfb;
  color:#7b8189;
  border:1px solid var(--line);
  flex:1;
}
.btn.wallpaper{
  background:#fbfbfb;
  color:#6f747b;
  border:1px solid var(--line);
  flex:1 0 100%;
}
.code-wrap{
  display:none;
  margin-top:12px;
}
.code-wrap.open{
  display:block;
}
.code-head{
  font-size:9.5px;
  color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:7px;
}
textarea{
  width:100%;
  min-height:240px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fbfbfb;
  color:#2b3036;
  padding:12px;
  font-size:10px;
  line-height:1.62;
  resize:vertical;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
.footer{
  text-align:center;
  color:#bfc3c9;
  font-size:9.5px;
  padding:2px 0 0;
  line-height:1.7;
  letter-spacing:.035em;
}
.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%) translateY(16px);
  opacity:0;
  background:#171717;
  color:#fff;
  font-size:10.5px;
  padding:9px 12px;
  border-radius:999px;
  pointer-events:none;
  transition:.22s ease;
  z-index:99;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div class="main">
  <div class="shell">
    <section class="card header">
      <a class="back" href="index.html">← back home</a>
      <h1 class="archive-title">Cross Room</h1>
      <p class="archive-sub">Cross 整理的主题。复制代码后按需自用，请勿搬运、倒卖及二次发布。</p>
    </section>

    <section class="card search-card">
      <div class="search-row">
        <input id="themeSearch" type="search" placeholder="搜索：主题名 / 标签 / 330" autocomplete="off" />
        <button class="clear-btn" type="button" onclick="clearThemeSearch()">清空</button>
      </div>
      <div class="result-count" id="resultCount">loading...</div>
    </section>

    <div id="themeList" class="shell"></div>

    <div class="footer">for personal use only · repost / resale prohibited</div>
  </div>
</div>

<div class="toast" id="toast">已复制</div>

<script>
const repoOwner = 'angelcssroom';
const repoName = 'cloud-room';
const branch = 'main';

const themeList = document.getElementById('themeList');
const search = document.getElementById('themeSearch');
const count = document.getElementById('resultCount');
let themes = [];

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}
function slugToTitle(slug){
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function rawUrl(fileName){
  return `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${encodeURIComponent(fileName)}`;
}
async function fetchTextFile(fileName){
  const res = await fetch(rawUrl(fileName) + '?v=' + Date.now());
  if(!res.ok) throw new Error('file not found: ' + fileName);
  return await res.text();
}
function parseInfo(text, slug){
  const get = key => {
    const m = text.match(new RegExp('^\\s*' + key + '\\s*[:：]\\s*(.+)$', 'im'));
    return m ? m[1].trim() : '';
  };
  const title = get('title') || slugToTitle(slug);
  const author = get('author') || 'Cross';
  const tagsRaw = get('tags') || '';
  const note = get('note') || '';
  const wallpaper = get('wallpaper') || '';
  const tags = tagsRaw ? tagsRaw.split(/[\/、,，|]+/).map(x => x.trim()).filter(Boolean) : [];
  return {title, author, tags, note, wallpaper};
}
function renderThemes(list){
  themeList.innerHTML = '';
  list.forEach((theme, index) => {
    const tagsHtml = theme.tags.map(t => `<span class="keyword">${escapeHtml(t)}</span>`).join('');
    const wallpaperBtn = theme.wallpaper ? `<a class="btn wallpaper" href="${escapeHtml(theme.wallpaper)}" download>下载壁纸附件</a>` : '';
    const article = document.createElement('article');
    article.className = 'card theme-card';
    article.dataset.search = theme.searchText;
    article.innerHTML = `
      <div class="theme-top">
        <div>
          <h3 class="theme-name">${escapeHtml(theme.title)}</h3>
          <p class="theme-alt">@${escapeHtml(theme.author)}</p>
        </div>
        <div class="theme-no">${String(index + 1).padStart(2, '0')}</div>
      </div>
      ${tagsHtml ? `<div class="keywords">${tagsHtml}</div>` : ''}
      ${theme.note ? `<div class="micro">${escapeHtml(theme.note)}</div>` : ''}
      ${theme.previewFile ? `
      <div class="preview-image-wrap">
        <img src="${escapeHtml(theme.previewFile)}" alt="${escapeHtml(theme.title)} preview" onerror="this.closest('.preview-image-wrap').outerHTML='<div class=&quot;preview-missing&quot;>预览图暂时没加载出来<br>CSS 仍然可以复制</div>'" />
      </div>` : `
      <div class="preview-missing">没有找到同名预览图<br>请检查 preview-cross-${escapeHtml(theme.slug)}.jpg</div>`}
      <div class="action-row">
        <button class="btn copy" type="button" onclick="copyFile('${escapeHtml(theme.cssFile)}')">复制全部代码</button>
        <button class="btn open" type="button" onclick="previewFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}','area-${escapeHtml(theme.slug)}')">展开代码</button>
        ${wallpaperBtn}
      </div>
      <div class="code-wrap" id="wrap-${escapeHtml(theme.slug)}">
        <div class="code-head">external css / ${escapeHtml(theme.cssFile)}</div>
        <textarea id="area-${escapeHtml(theme.slug)}" readonly></textarea>
      </div>
    `;
    themeList.appendChild(article);
  });
  count.textContent = list.length + ' result' + (list.length === 1 ? '' : 's');
}
function updateThemeSearch(){
  const q = search.value.trim().toLowerCase();
  const list = !q ? themes : themes.filter(t => t.searchText.toLowerCase().includes(q));
  renderThemes(list);
}
function clearThemeSearch(){
  search.value = '';
  search.blur();
  updateThemeSearch();
}
search.addEventListener('input', updateThemeSearch);

async function copyFile(fileName){
  try{
    const text = await fetchTextFile(fileName);
    await navigator.clipboard.writeText(text);
    showToast('已复制全部代码');
  }catch(err){
    showToast('复制失败，请检查 CSS 文件名');
    console.error(err);
  }
}
async function previewFile(fileName, wrapId, areaId){
  const wrap = document.getElementById(wrapId);
  const area = document.getElementById(areaId);
  try{
    if(!area.value) area.value = await fetchTextFile(fileName);
    wrap.classList.toggle('open');
  }catch(err){
    showToast('展开失败，请检查 CSS 文件名');
    console.error(err);
  }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1500);
}
async function loadThemes(){
  try{
    const api = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/?ref=${branch}`;
    let res = await fetch(api + '&v=' + Date.now());
    if(!res.ok){
      await new Promise(r => setTimeout(r, 1200));
      res = await fetch(api + '&v=' + Date.now());
    }
    if(!res.ok) throw new Error('repo contents failed');
    const files = await res.json();
    const names = files.map(f => f.name);
    const cssNames = names.filter(n => /^css-cross-.+\.txt$/i.test(n)).sort();

    const loaded = [];
    for(const cssFile of cssNames){
      const slug = cssFile.replace(/^css-cross-/i, '').replace(/\.txt$/i, '');
      const safeSlug = slug.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const previewFile = names.find(n => new RegExp('^preview-cross-' + safeSlug + '\\.(jpg|jpeg|png|webp)$', 'i').test(n)) || '';
      const infoFile = names.find(n => new RegExp('^info-cross-' + safeSlug + '\\.txt$', 'i').test(n)) || '';
      let meta = {title: slugToTitle(slug), author: 'Cross', tags: [], note: '', wallpaper: ''};
      if(infoFile){
        try{
          meta = parseInfo(await fetchTextFile(infoFile), slug);
        }catch(e){}
      }
      loaded.push({
        slug, cssFile, previewFile,
        title: meta.title, author: meta.author, tags: meta.tags, note: meta.note, wallpaper: meta.wallpaper,
        searchText: [meta.title, meta.author, meta.tags.join(' '), meta.note, slug].join(' ')
      });
    }
    themes = loaded;
    renderThemes(themes);
  }catch(err){
    count.textContent = 'refreshing needed';
    themeList.innerHTML = '<section class="card theme-card"><div class="micro">GitHub 还没刷新出来。等半分钟后重新打开页面，或者在网址后面换一个 ?v=数字。</div></section>';
    console.error(err);
  }
}
loadThemes();
</script>
</body>
</html>
