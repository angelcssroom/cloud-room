<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Cross Room</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;
  --card:#fff;
  --text:#171717;
  --sub:#666b72;
  --muted:#9da2a9;
  --line:#ececec;
  --soft:#fafafa;
  --shadow:0 4px 14px rgba(0,0,0,.038);
  --radius:12px;
}
html,body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Hiragino Sans GB","PingFang SC",Arial,sans-serif;
  font-weight:400;
}
body{
  padding:24px 16px 44px;
}
.main{
  max-width:680px;
  margin:0 auto;
}
.shell{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.header{
  padding:16px 17px 18px;
}
.back{
  display:inline-flex;
  text-decoration:none;
  color:var(--sub);
  font-size:10.5px;
  line-height:1.4;
  margin-bottom:13px;
  font-weight:430;
}
.archive-title{
  margin:0;
  font-size:20px;
  line-height:1.18;
  letter-spacing:-.025em;
  font-weight:650;
}
.archive-sub{
  margin:10px 0 0;
  color:var(--sub);
  font-size:11px;
  line-height:1.72;
  font-weight:430;
}
.search-card{
  padding:12px;
}
.search-row{
  display:flex;
  gap:8px;
}
#themeSearch{
  flex:1;
  height:36px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  padding:0 12px;
  outline:none;
  color:var(--text);
  font-size: 16px;
  font-family:inherit;
  font-weight:400;
}
#themeSearch::placeholder{
  color:#b3b7bd;
  font-size:11px;
}
.clear-btn{
  width:54px;
  height:36px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fbfbfb;
  color:#858a91;
  font-size:10.5px;
  font-weight:560;
  font-family:inherit;
}
.result-count{
  margin:8px 0 0 4px;
  color:var(--muted);
  font-size:10px;
  letter-spacing:.03em;
  font-weight:520;
}
.theme-card{
  padding:16px 17px 17px;
}
.theme-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.theme-name{
  margin:0;
  font-size:18px;
  font-weight:650;
  letter-spacing:-.025em;
  line-height:1.18;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","PingFang SC",Arial,sans-serif;
}
.theme-alt{
  margin:7px 0 0;
  color:var(--sub);
  font-size:11px;
  line-height:1.45;
  font-weight:500;
}
.theme-no{
  font-size:10.5px;
  color:var(--muted);
  font-family:Georgia,"Times New Roman",serif;
  padding-top:2px;
}
.keywords{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:13px;
}
.keyword{
  padding:4.5px 8px;
  border-radius:999px;
  background:#fbfbfb;
  border:1px solid var(--line);
  color:#777d85;
  font-size:10px;
  line-height:1.2;
  font-weight:520;
}
.micro{
  margin-top:12px;
  color:#747980;
  font-size:11px;
  line-height:1.72;
  font-weight:430;
}
.preview-image-wrap{
  margin-top:14px;
  width:100%;
  height:min(560px,64vh);
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:zoom-in;
}
.preview-image-wrap img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  background:#fff;
}
@media (max-width:480px){
  .preview-image-wrap{height:min(530px,60vh);}
}
.preview-missing{
  margin-top:14px;
  border:1px dashed #dfe3e8;
  border-radius:12px;
  background:#fbfbfb;
  color:#a4abb4;
  height:160px;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:11px;
  line-height:1.7;
  font-weight:430;
  padding:18px;
}
.action-row{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}
.btn{
  appearance:none;
  border:none;
  border-radius:999px;
  min-height:36px;
  padding:0 14px;
  font-size:11px;
  line-height:1.2;
  font-weight:620;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:inherit;
}
.btn.copy{
  background:#171717;
  color:#fff;
  flex:1;
}
.btn.copy:disabled{
  opacity:.46;
  cursor:default;
}
.btn.open{
  background:#fbfbfb;
  color:#7b8189;
  border:1px solid var(--line);
  flex:1;
}
.btn.wallpaper{
  background:#fbfbfb;
  color:#6f747b;
  border:1px solid var(--line);
  flex:1 0 100%;
}
.code-wrap{
  display:none;
  margin-top:12px;
}
.code-wrap.open{
  display:block;
}
.code-head{
  font-size:9.5px;
  color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:7px;
}
textarea{
  width:100%;
  height:132px;
  max-height:132px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fbfbfb;
  color:#2b3036;
  padding:10px 11px;
  font-size:10.5px;
  line-height:1.55;
  resize:none;
  overflow:auto;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}

.series-card{padding:16px 17px 17px;}
.series-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.variant-card{border:1px solid var(--line);border-radius:12px;padding:13px;background:#fff;}
.variant-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.variant-name{margin:0;font-size:13px;font-weight:650;line-height:1.25;letter-spacing:-.01em;}
.variant-slug{margin:5px 0 0;color:var(--muted);font-size:9.5px;line-height:1.4;}
.variant-tag{flex:0 0 auto;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:#fbfbfb;color:#858a91;font-size:9.5px;font-weight:560;}
.variant-card .preview-image-wrap,.variant-card .preview-missing{margin-top:11px;}
.variant-card .preview-image-wrap{height:min(500px,57vh);}
.variant-card .action-row{margin-top:10px;}
.variant-card .btn{min-height:34px;font-size:10.5px;}


.image-lightbox{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);
}
.image-lightbox.show{display:flex;}
.image-lightbox img{
  max-width:100%;
  max-height:92vh;
  object-fit:contain;
  border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.10);
}
.image-lightbox-close{
  position:fixed;
  top:calc(14px + env(safe-area-inset-top));
  right:16px;
  width:34px;
  height:34px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  color:#222;
  font-size:18px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow);
}

.footer{
  text-align:center;
  color:#bfc3c9;
  font-size:9.5px;
  padding:2px 0 0;
  line-height:1.7;
  letter-spacing:.035em;
}
.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%) translateY(16px);
  opacity:0;
  background:#171717;
  color:#fff;
  font-size:10.5px;
  padding:9px 12px;
  border-radius:999px;
  pointer-events:none;
  transition:.22s ease;
  z-index:99;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.search-hit{
  background:#ececec;
  color:#111;
  border-radius:4px;
  padding:0 .12em;
}
#themeList{
  min-height:min(720px,72vh);
}
.loading-card{
  padding:16px 17px 17px;
}
.loading-line{
  height:12px;
  border-radius:999px;
  background:#f1f1f1;
}
.loading-line.title{
  width:42%;
  height:18px;
}
.loading-line.sub{
  width:24%;
  height:9px;
  margin-top:9px;
}
.loading-tags{
  display:flex;
  gap:6px;
  margin-top:14px;
}
.loading-tag{
  width:46px;
  height:22px;
  border-radius:999px;
  background:#f4f4f4;
  border:1px solid #eeeeee;
}
.loading-preview{
  margin-top:14px;
  height:min(430px,50vh);
  border-radius:14px;
  border:1px solid var(--line);
  background:#fafafa;
}
.loading-actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.loading-action{
  flex:1;
  height:36px;
  border-radius:999px;
  background:#f3f3f3;
}
.loading-action:first-child{
  background:#e8e8e8;
}

.new-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:7px;
  padding:3px 6px;
  border-radius:999px;
  border:1px solid #d8d8d8;
  background:#f7f7f7;
  color:#575757;
  font-size:8.5px;
  line-height:1;
  font-weight:700;
  letter-spacing:.06em;
  vertical-align:2px;
}


.btn.favorite-toggle{
  flex:0 0 30px;
  width:30px;
  min-width:30px;
  min-height:36px;
  padding:0;
  border:1px solid var(--line);
  background:#ffffff;
  color:#aaaeb4;
  font-family:"Times New Roman","Noto Serif Symbols",serif;
  font-size:14px;
  font-weight:400;
  line-height:1;
  transition:color .16s ease,border-color .16s ease,transform .16s ease,background .16s ease;
}
.btn.favorite-toggle.is-saved{
  color:#202022;
  border-color:#cfcfd2;
  background:#fafafa;
}
.btn.favorite-toggle:active{
  transform:scale(.9);
}

</style>
</head>
<body>
<div class="main">
  <div class="shell">
    <section class="card header">
      <a class="back" href="index.html">← back home</a>
      <h1 class="archive-title">Cross Room</h1>
    </section>

    <section class="card search-card">
      <div class="search-row">
        <input id="themeSearch" type="search" placeholder="搜索：主题名 / 标签 / 330" autocomplete="off" />
        <button class="clear-btn" type="button" onclick="clearThemeSearch()">清空</button>
      </div>
      <div class="result-count" id="resultCount">loading...</div>
    </section>

    <div id="themeList" class="shell"></div>

    <div class="footer">personal use only</div>
  </div>
</div>

<div class="toast" id="toast">已复制</div>


<div class="image-lightbox" id="imageLightbox" onclick="closeImageLightbox(event)">
  <button class="image-lightbox-close" type="button" aria-label="关闭" onclick="closeImageLightbox(event,true)">×</button>
  <img id="imageLightboxImg" alt="" />
</div>

<script>
const repoOwner = 'angelcssroom';
const repoName = 'cloud-room';
const branch = 'main';
const typePrefix = 'cross';
const defaultAuthor = 'Cross';
const previewLabel = 'preview-cross';
const newDays = 7;
const FAVORITES_KEY = 'cloudRoomFavoritesV1';
const roomLabel = 'Cross Room';

/*
  系列规则：
  1. info 文件写了 series: 才按 series 合并。
  2. 旧主题只允许进入下面这个“精确白名单”。
  3. 禁止再根据共同前缀自动判断，避免两个不同主题被误套成同一系列。
*/
const LEGACY_SERIES_BY_SLUG = typePrefix === 'cross'
  ? {
      'mamegoma-yellow': 'mamegoma',
      'mamegoma-blue': 'mamegoma',
      'mamegoma-purple': 'mamegoma',
      'mamegoma-pink': 'mamegoma',
      'mamegoma-black': 'mamegoma'
    }
  : {};

function resolvedSeriesName(theme){
  const explicit = String(theme.series || '').trim();
  if(explicit) return explicit;
  return LEGACY_SERIES_BY_SLUG[String(theme.slug || '').toLowerCase()] || '';
}

const themeList = document.getElementById('themeList');
const search = document.getElementById('themeSearch');
const count = document.getElementById('resultCount');
let themes = [];
const cssTextCache = new Map();
const cssLoadingTasks = new Map();
let cssObserver = null;


function readFavorites(){
  try{
    const value = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
    return Array.isArray(value) ? value.filter(item => item && item.key) : [];
  }catch(error){
    console.error(error);
    return [];
  }
}

function favoriteKey(theme){
  return typePrefix + ':' + theme.slug;
}

function isFavoriteTheme(theme){
  const key = favoriteKey(theme);
  return readFavorites().some(item => item.key === key);
}

function favoriteButton(theme){
  const saved = isFavoriteTheme(theme);
  return `<button class="btn favorite-toggle${saved ? ' is-saved' : ''}"
    type="button"
    data-favorite-key="${escapeHtml(favoriteKey(theme))}"
    data-slug="${escapeHtml(theme.slug)}"
    aria-label="${saved ? '取消收藏' : '收藏主题'}"
    aria-pressed="${saved ? 'true' : 'false'}"
    onclick="toggleFavorite(this.dataset.slug)">✝︎</button>`;
}

function syncFavoriteButtons(){
  const savedKeys = new Set(readFavorites().map(item => item.key));
  document.querySelectorAll('.favorite-toggle[data-favorite-key]').forEach(button => {
    const saved = savedKeys.has(button.dataset.favoriteKey);
    button.classList.toggle('is-saved', saved);
    button.textContent = '✝︎';
    button.setAttribute('aria-label', saved ? '取消收藏' : '收藏主题');
    button.setAttribute('aria-pressed', saved ? 'true' : 'false');
  });
}

function toggleFavorite(slug){
  const theme = themes.find(item => item.slug === slug);
  if(!theme) return;

  const key = favoriteKey(theme);
  const items = readFavorites();
  const index = items.findIndex(item => item.key === key);

  if(index >= 0){
    items.splice(index, 1);
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(items));
    syncFavoriteButtons();
    showToast('已取消收藏');
    return;
  }

  items.unshift({
    key,
    room: typePrefix,
    roomLabel,
    slug: theme.slug,
    title: theme.title,
    author: theme.author,
    tags: Array.isArray(theme.tags) ? theme.tags : [],
    note: theme.note || '',
    cssFile: theme.cssFile,
    previewFile: theme.previewFile || '',
    wallpaper: theme.wallpaper || '',
    series: resolvedSeriesName(theme),
    savedAt: Date.now()
  });

  localStorage.setItem(FAVORITES_KEY, JSON.stringify(items));
  syncFavoriteButtons();
  showToast('已加入收藏');
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}
function escapeRegExp(str){
  return String(str || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function highlightText(str, query){
  const safe = escapeHtml(str);
  const q = String(query || '').trim();
  if(!q) return safe;
  return safe.replace(new RegExp('(' + escapeRegExp(escapeHtml(q)) + ')', 'ig'), '<mark class="search-hit">$1</mark>');
}
function slugToTitle(slug){
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function rawUrl(fileName){
  return `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${encodeURIComponent(fileName)}`;
}
async function fetchTextFile(fileName){
  const safePath = String(fileName).split('/').map(encodeURIComponent).join('/');
  const localUrl = new URL('./' + safePath, window.location.href).href;
  let res = await fetch(localUrl + '?v=' + Date.now(), {cache:'no-store'});
  if(!res.ok){
    res = await fetch(rawUrl(fileName) + '?v=' + Date.now(), {cache:'no-store'});
  }
  if(!res.ok) throw new Error('file not found: ' + fileName);
  return await res.text();
}
async function fetchLastUpdated(fileName){
  try{
    const url = `https://api.github.com/repos/${repoOwner}/${repoName}/commits?sha=${encodeURIComponent(branch)}&path=${encodeURIComponent(fileName)}&per_page=1`;
    const res = await fetch(url);
    if(!res.ok) return 0;
    const data = await res.json();
    const date = data?.[0]?.commit?.committer?.date || data?.[0]?.commit?.author?.date;
    return date ? new Date(date).getTime() : 0;
  }catch(e){
    return 0;
  }
}
function parseInfo(text, slug){
  const get = key => {
    const m = text.match(new RegExp('^\\s*' + key + '\\s*[:：]\\s*(.+)$', 'im'));
    return m ? m[1].trim() : '';
  };
  const title = get('title') || slugToTitle(slug);
  const author = get('author') || defaultAuthor;
  const tagsRaw = get('tags') || '';
  const note = get('note') || '';
  const wallpaper = get('wallpaper') || '';
  const series = get('series') || '';
  const tags = tagsRaw ? tagsRaw.split(/[\/、,，|]+/).map(x => x.trim()).filter(Boolean) : [];
  return {title, author, tags, note, wallpaper, series};
}
function buildGroups(allThemes){
  const map = new Map();

  allThemes.forEach(theme => {
    const seriesName = resolvedSeriesName(theme);
    const key = seriesName
      ? 'series:' + seriesName
      : 'theme:' + theme.slug;

    if(!map.has(key)){
      map.set(key, {
        seriesName,
        items:[]
      });
    }

    map.get(key).items.push(theme);
  });

  return [...map.entries()].map(([key, group]) => {
    const items = group.items;

    items.sort((a,b) =>
      (b.updatedAt || 0) - (a.updatedAt || 0) ||
      a.title.localeCompare(b.title, 'zh-CN')
    );

    const isSeries = Boolean(group.seriesName) && items.length > 1;

    return {
      base:key,
      items,
      isSeries,
      title:isSeries ? group.seriesName : items[0].title,
      author:items[0].author,
      updatedAt:Math.max(...items.map(item => item.updatedAt || 0)),
      searchText:items.map(item => item.searchText).join(' ')
    };
  }).sort((a,b) =>
    (b.updatedAt || 0) - (a.updatedAt || 0) ||
    a.title.localeCompare(b.title, 'zh-CN')
  );
}
function isNew(ts){
  return !!ts && (Date.now() - ts) <= newDays * 86400000;
}

function openImageLightbox(src, alt){
  const box = document.getElementById('imageLightbox');
  const img = document.getElementById('imageLightboxImg');
  img.src = src;
  img.alt = alt || '预览图';
  box.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeImageLightbox(event, force){
  const box = document.getElementById('imageLightbox');
  if(!force && event && event.target !== box) return;
  box.classList.remove('show');
  document.body.style.overflow = '';
}

function previewFallback(img){
  const wrap = img.closest('.preview-image-wrap');
  if(!wrap) return;
  const box = document.createElement('div');
  box.className = 'preview-missing';
  box.textContent = '暂无预览';
  wrap.replaceWith(box);
}
function renderVariant(theme, query=''){
  const wallpaperBtn = theme.wallpaper ? `<a class="btn wallpaper" href="${escapeHtml(theme.wallpaper)}" download>壁纸</a>` : '';
  const colorTag = theme.tags.find(t => /^(黄|蓝|紫|粉|黑|白|红|绿|灰|棕|橙|pink|blue|black|yellow|purple|red|green)$/i.test(t)) || '';
  const newBadge = isNew(theme.updatedAt) ? '<span class="new-badge">NEW</span>' : '';
  return `
    <section class="variant-card" data-variant-search="${escapeHtml(theme.searchText.toLowerCase())}">
      <div class="variant-top">
        <h4 class="variant-name">${highlightText(theme.title, query)}${newBadge}</h4>
        ${colorTag ? `<span class="variant-tag">${highlightText(colorTag, query)}</span>` : ''}
      </div>
      ${theme.note ? `<div class="micro">${highlightText(theme.note, query)}</div>` : ''}
      ${theme.previewFile ? `<div class="preview-image-wrap"><img src="${escapeHtml(theme.previewFile)}" alt="${escapeHtml(theme.title)} preview" loading="lazy" decoding="async" onerror="previewFallback(this)" onclick="openImageLightbox(this.src,this.alt)" /></div>` : `<div class="preview-missing">暂无预览</div>`}
      <div class="action-row">
        <button class="btn copy" type="button" data-css-file="${escapeHtml(theme.cssFile)}" ${cssTextCache.has(theme.cssFile) ? '' : 'disabled'} onclick="copyFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}')">${cssTextCache.has(theme.cssFile) ? '复制' : '载入中'}</button>
        <button class="btn open" type="button" onclick="previewFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}','area-${escapeHtml(theme.slug)}')">代码</button>
        ${favoriteButton(theme)}
        ${wallpaperBtn}
      </div>
      <div class="code-wrap" id="wrap-${escapeHtml(theme.slug)}">
        <textarea id="area-${escapeHtml(theme.slug)}" readonly aria-label="CSS code"></textarea>
      </div>
    </section>`;
}
function renderSingleTheme(theme, query, number){
  const tagsHtml = theme.tags.map(t => `<span class="keyword">${highlightText(t, query)}</span>`).join('');
  const wallpaperBtn = theme.wallpaper ? `<a class="btn wallpaper" href="${escapeHtml(theme.wallpaper)}" download>壁纸</a>` : '';
  const newBadge = isNew(theme.updatedAt) ? '<span class="new-badge">NEW</span>' : '';
  return `
    <article class="card theme-card">
      <div class="theme-top">
        <div>
          <h3 class="theme-name">${highlightText(theme.title, query)}${newBadge}</h3>
          <p class="theme-alt">@${highlightText(theme.author, query)}</p>
        </div>
        <div class="theme-no">${String(number).padStart(2, '0')}</div>
      </div>
      ${tagsHtml ? `<div class="keywords">${tagsHtml}</div>` : ''}
      ${theme.note ? `<div class="micro">${highlightText(theme.note, query)}</div>` : ''}
      ${theme.previewFile ? `<div class="preview-image-wrap"><img src="${escapeHtml(theme.previewFile)}" alt="${escapeHtml(theme.title)} preview" loading="lazy" decoding="async" onerror="previewFallback(this)" onclick="openImageLightbox(this.src,this.alt)" /></div>` : `<div class="preview-missing">暂无预览</div>`}
      <div class="action-row">
        <button class="btn copy" type="button" data-css-file="${escapeHtml(theme.cssFile)}" ${cssTextCache.has(theme.cssFile) ? '' : 'disabled'} onclick="copyFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}')">${cssTextCache.has(theme.cssFile) ? '复制' : '载入中'}</button>
        <button class="btn open" type="button" onclick="previewFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}','area-${escapeHtml(theme.slug)}')">代码</button>
        ${favoriteButton(theme)}
        ${wallpaperBtn}
      </div>
      <div class="code-wrap" id="wrap-${escapeHtml(theme.slug)}">
        <textarea id="area-${escapeHtml(theme.slug)}" readonly aria-label="CSS code"></textarea>
      </div>
    </article>`;
}

function setCopyReady(fileName){
  document.querySelectorAll('button.copy[data-css-file]').forEach(button => {
    if(button.dataset.cssFile === fileName){
      button.disabled = false;
      button.textContent = '复制';
    }
  });
}

function preloadCss(fileName){
  if(cssTextCache.has(fileName)){
    setCopyReady(fileName);
    return Promise.resolve(cssTextCache.get(fileName));
  }
  if(cssLoadingTasks.has(fileName)){
    return cssLoadingTasks.get(fileName);
  }

  const task = fetchTextFile(fileName)
    .then(text => {
      cssTextCache.set(fileName, text);
      setCopyReady(fileName);
      return text;
    })
    .catch(err => {
      console.error('CSS preload failed:', fileName, err);
      throw err;
    })
    .finally(() => {
      cssLoadingTasks.delete(fileName);
    });

  cssLoadingTasks.set(fileName, task);
  return task;
}

function setupLazyCssLoading(){
  if(cssObserver){
    cssObserver.disconnect();
    cssObserver = null;
  }

  const buttons = [...document.querySelectorAll('button.copy[data-css-file]')];
  if(!buttons.length) return;

  buttons.forEach(button => {
    const fileName = button.dataset.cssFile;
    if(cssTextCache.has(fileName)){
      setCopyReady(fileName);
    }
  });

  const firstFiles = [...new Set(buttons.slice(0, 3).map(button => button.dataset.cssFile))];
  firstFiles.forEach(fileName => preloadCss(fileName).catch(() => {}));

  if('IntersectionObserver' in window){
    cssObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(!entry.isIntersecting) return;
        const button = entry.target;
        preloadCss(button.dataset.cssFile).catch(() => {});
        cssObserver.unobserve(button);
      });
    }, {rootMargin:'900px 0px'});

    buttons.forEach(button => {
      if(!cssTextCache.has(button.dataset.cssFile)){
        cssObserver.observe(button);
      }
    });
    return;
  }

  const remaining = [...new Set(buttons.map(button => button.dataset.cssFile))]
    .filter(fileName => !cssTextCache.has(fileName));

  let index = 0;
  const loadBatch = () => {
    remaining.slice(index, index + 3).forEach(fileName => preloadCss(fileName).catch(() => {}));
    index += 3;
    if(index < remaining.length){
      setTimeout(loadBatch, 180);
    }
  };
  loadBatch();
}

function renderThemes(list, query=''){
  themeList.innerHTML = '';
  const groups = buildGroups(list);
  const q = query.trim().toLowerCase();
  let visibleGroups = 0;
  groups.forEach(group => {
    let visibleItems = group.items;
    if(q){
      const itemMatches = group.items.filter(item => item.searchText.toLowerCase().includes(q));
      if(itemMatches.length){
        visibleItems = itemMatches;
      }else if(!group.searchText.toLowerCase().includes(q)){
        return;
      }
    }
    visibleGroups++;
    if(!group.isSeries){
      themeList.insertAdjacentHTML('beforeend', renderSingleTheme(visibleItems[0], query, visibleGroups));
      return;
    }
    const article = document.createElement('article');
    article.className = 'card series-card';
    const commonTags = group.items[0].tags.filter(tag => group.items.every(item => item.tags.includes(tag)));
    const tagsHtml = commonTags.map(t => `<span class="keyword">${highlightText(t, query)}</span>`).join('');
    const newBadge = isNew(group.updatedAt) ? '<span class="new-badge">NEW</span>' : '';
    article.innerHTML = `
      <div class="theme-top">
        <div>
          <h3 class="theme-name">${highlightText(group.title, query)}${newBadge}</h3>
          <p class="theme-alt">@${highlightText(group.author, query)}</p>
        </div>
        <div class="theme-no">${String(visibleGroups).padStart(2, '0')}</div>
      </div>
      ${tagsHtml ? `<div class="keywords">${tagsHtml}</div>` : ''}
      <div class="series-list">${visibleItems.map(item => renderVariant(item, query)).join('')}</div>`;
    themeList.appendChild(article);
  });
  count.textContent = visibleGroups ? String(visibleGroups) : '0';
  setupLazyCssLoading();
  syncFavoriteButtons();

}
function updateThemeSearch(){
  renderThemes(themes, search.value.trim());
}
function clearThemeSearch(){
  search.value = '';
  search.blur();
  updateThemeSearch();
}
search.addEventListener('input', updateThemeSearch);

function legacyCopyText(text){
  const area = document.createElement('textarea');
  area.value = text;
  area.setAttribute('readonly', '');
  area.style.position = 'fixed';
  area.style.left = '0';
  area.style.top = '0';
  area.style.width = '1px';
  area.style.height = '1px';
  area.style.opacity = '0.01';
  area.style.fontSize = '16px';
  document.body.appendChild(area);
  area.focus({preventScroll:true});
  area.select();
  area.setSelectionRange(0, area.value.length);
  let copied = false;
  try{ copied = document.execCommand('copy'); }catch(err){ console.error(err); }
  area.remove();
  return copied;
}

function finishCopy(wrapId){
  const wrap = document.getElementById(wrapId);
  if(wrap) wrap.classList.remove('open');
  showToast('已复制全部代码');
}

function copyFile(fileName, wrapId){
  const text = cssTextCache.get(fileName);
  if(typeof text !== 'string'){
    showToast('代码正在加载，请再点一次');
    fetchTextFile(fileName).then(value => cssTextCache.set(fileName, value)).catch(console.error);
    return;
  }

  if(legacyCopyText(text)){
    finishCopy(wrapId);
    return;
  }

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text)
      .then(() => finishCopy(wrapId))
      .catch(err => {
        console.error(err);
        showToast('复制失败，请重新点一次');
      });
    return;
  }

  showToast('复制失败，请重新点一次');
}
async function previewFile(fileName, wrapId, areaId){
  const wrap = document.getElementById(wrapId);
  const area = document.getElementById(areaId);
  if(wrap.classList.contains('open') && area.dataset.currentFile === fileName){
    wrap.classList.remove('open');
    return;
  }
  try{
    if(area.dataset.currentFile !== fileName){
      area.value = await fetchTextFile(fileName);
      area.dataset.currentFile = fileName;
    }
    wrap.classList.add('open');
  }catch(err){
    showToast('展开失败，请检查 CSS 文件名');
    console.error(err);
  }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1500);
}

async function mapWithConcurrency(items, limit, mapper){
  const results = new Array(items.length);
  let cursor = 0;

  async function worker(){
    while(true){
      const index = cursor++;
      if(index >= items.length) return;
      results[index] = await mapper(items[index], index);
    }
  }

  const workerCount = Math.min(limit, items.length);
  await Promise.all(Array.from({length: workerCount}, worker));
  return results;
}

async function loadThemes(){
  try{
    const api = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/?ref=${branch}`;
    let res = await fetch(api + '&v=' + Date.now());
    if(!res.ok){
      await new Promise(r => setTimeout(r, 1200));
      res = await fetch(api + '&v=' + Date.now());
    }
    if(!res.ok) throw new Error('repo contents failed');
    const files = await res.json();
    const names = files.map(f => f.name);
    const cssRegex = new RegExp('^css-' + typePrefix + '-.+\\.txt$', 'i');
    const cssNames = names.filter(n => cssRegex.test(n));

    count.textContent = 'loading...';
    themeList.innerHTML = `
      <section class="card loading-card" aria-hidden="true">
        <div class="loading-line title"></div>
        <div class="loading-line sub"></div>
        <div class="loading-tags">
          <span class="loading-tag"></span>
          <span class="loading-tag"></span>
          <span class="loading-tag"></span>
        </div>
        <div class="loading-preview"></div>
        <div class="loading-actions">
          <span class="loading-action"></span>
          <span class="loading-action"></span>
        </div>
      </section>`;

    const loaded = await mapWithConcurrency(cssNames, 6, async cssFile => {
      const slug = cssFile.replace(new RegExp('^css-' + typePrefix + '-', 'i'), '').replace(/\.txt$/i, '');
      const safeSlug = escapeRegExp(slug);
      const previewFile = names.find(n => new RegExp('^preview-' + typePrefix + '-' + safeSlug + '\\.(jpg|jpeg|png|webp)$', 'i').test(n)) || '';
      const infoFile = names.find(n => new RegExp('^info-' + typePrefix + '-' + safeSlug + '\\.txt$', 'i').test(n)) || '';

      const metaPromise = infoFile
        ? fetchTextFile(infoFile)
            .then(text => parseInfo(text, slug))
            .catch(() => ({title: slugToTitle(slug), author: defaultAuthor, tags: [], note: '', wallpaper: '', series: ''}))
        : Promise.resolve({title: slugToTitle(slug), author: defaultAuthor, tags: [], note: '', wallpaper: '', series: ''});

      const [meta, updatedAt] = await Promise.all([
        metaPromise,
        fetchLastUpdated(cssFile)
      ]);

      return {
        slug, cssFile, previewFile, updatedAt,
        title: meta.title, author: meta.author, tags: meta.tags, note: meta.note, wallpaper: meta.wallpaper, series: meta.series || '',
        searchText: [meta.title, meta.author, meta.tags.join(' '), meta.note, meta.series || '', slug].join(' ')
      };
    });

    themes = loaded.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0) || a.title.localeCompare(b.title, 'zh-CN'));
    renderThemes(themes, search.value);
  }catch(err){
    count.textContent = 'refreshing needed';
    themeList.innerHTML = '<section class="card theme-card"><div class="micro">GitHub 还没刷新出来。等半分钟后重新打开页面，或者在网址后面换一个 ?v=数字。</div></section>';
    console.error(err);
  }
}
window.addEventListener('storage', event => {
  if(event.key === FAVORITES_KEY) syncFavoriteButtons();
});
window.addEventListener('pageshow', syncFavoriteButtons);

loadThemes();
</script>
