<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cloud Room · 成员管理</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--text:#171717;--sub:#777;--line:#e8e8e8;--soft:#f7f7f7;--danger:#a53d3d;--ok:#287a4b}
html,body{margin:0;min-height:100%;background:#fff;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC",sans-serif}
body{padding:24px 16px 52px}
.shell{width:min(100%,720px);margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
h1{font-size:20px;margin:0;letter-spacing:-.02em}
.sub{margin:6px 0 0;color:var(--sub);font-size:11px}
.panel{border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}
.panel h2{font-size:14px;margin:0 0 6px}
.help{font-size:10px;color:#8c8c8c;line-height:1.7;margin:0 0 13px}
label{display:block;font-size:11px;font-weight:650;margin:0 0 7px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:0 12px;color:var(--text);font:inherit;outline:none}
input{height:44px;font-size:14px}
textarea{min-height:132px;padding-top:11px;padding-bottom:11px;font-size:13px;line-height:1.6;resize:vertical}
input:focus,textarea:focus{border-color:#b8b8b8;box-shadow:0 0 0 3px rgba(0,0,0,.035)}
button{border:0;border-radius:10px;height:42px;padding:0 15px;background:#171717;color:#fff;font-size:12px;font-weight:650;cursor:pointer;white-space:nowrap}
button:disabled{opacity:.45;cursor:default}
button.secondary{background:var(--soft);color:#222;border:1px solid var(--line)}
button.danger{background:#fff;color:var(--danger);border:1px solid #edd7d7}
button.small{height:34px;padding:0 11px;font-size:11px}
.row{display:flex;gap:8px;align-items:center}
.row input{flex:1;min-width:0}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.full{width:100%}
.msg{display:none;font-size:11px;line-height:1.6;margin:10px 1px 0;color:var(--danger)}
.msg.ok{color:var(--ok)}
.status{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:10px;background:var(--soft);font-size:11px;margin-bottom:12px}
.status strong{font-size:12px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.toolbar form{display:flex;gap:8px;flex:1}
.toolbar input{flex:1;min-width:0}
.count{font-size:11px;color:var(--sub);white-space:nowrap}
.member-list{border-top:1px solid var(--line)}
.member{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--line)}
.member-main{flex:1;min-width:0}
.member-qq{font-size:14px;font-weight:660}
.member-meta{font-size:9px;color:#999;line-height:1.55;margin-top:4px}
.member-actions{display:flex;gap:6px;flex-shrink:0}
.empty{text-align:center;color:#aaa;font-size:11px;padding:26px 0}
.login-wrap{width:min(100%,420px);margin:12vh auto 0}
.login-wrap .panel{padding:22px 20px}
.login-button{width:100%;margin-top:14px}
.logout{height:34px;background:#fff;color:#555;border:1px solid var(--line);font-size:11px}
.divider{height:1px;background:var(--line);margin:16px 0}
@media(max-width:560px){
  .row{align-items:stretch;flex-direction:column}.row button{width:100%}
  .toolbar{align-items:stretch;flex-direction:column}.toolbar form{width:100%}.count{align-self:flex-start}
  .member{align-items:flex-start;flex-direction:column}.member-actions{width:100%}.member-actions button{flex:1}
}
</style>
</head>
<body>
<div id="loginPanel" class="login-wrap" style="display:none">
  <div class="top"><div><h1>成员管理</h1><p class="sub">Cloud Room · administrator</p></div></div>
  <section class="panel">
    <form id="adminLoginForm">
      <label for="adminPassword">管理员密码</label>
      <input id="adminPassword" type="password" autocomplete="current-password" placeholder="请输入管理员密码" required>
      <button id="adminLoginButton" class="login-button" type="submit">进入成员管理</button>
      <p id="adminLoginMessage" class="msg"></p>
    </form>
  </section>
</div>

<main id="managePanel" class="shell" style="display:none">
  <div class="top">
    <div><h1>成员管理</h1><p class="sub">成员名单、群访问码与设备绑定</p></div>
    <button id="logoutButton" class="logout" type="button">退出后台</button>
  </div>

  <section class="panel">
    <h2>群访问码</h2>
    <p class="help">全群只用这一个访问码。保存新访问码后，已登录成员会退出一次，但设备绑定不会清除。</p>
    <div class="status"><span>当前状态</span><strong id="codeStatus">正在读取</strong></div>
    <label for="groupCode">设置或更换群访问码</label>
    <input id="groupCode" type="text" autocapitalize="characters" maxlength="32" placeholder="6–24 位英文字母或数字">
    <div class="actions">
      <button id="generateCodeButton" class="secondary" type="button">生成随机码</button>
      <button id="copyCodeButton" class="secondary" type="button">复制当前输入</button>
      <button id="saveCodeButton" type="button">保存群访问码</button>
    </div>
    <p id="codeMessage" class="msg"></p>
  </section>

  <section class="panel">
    <h2>批量导入成员</h2>
    <p class="help">把群成员 QQ 一次性粘贴进来。一行一个，或用空格、逗号分隔；已经存在的 QQ 会自动跳过。</p>
    <textarea id="bulkQqs" placeholder="123456789&#10;987654321&#10;……"></textarea>
    <button id="bulkButton" class="full" type="button" style="margin-top:10px">批量导入 QQ</button>
    <p id="bulkMessage" class="msg"></p>
  </section>

  <section class="panel">
    <h2>添加单个成员</h2>
    <p class="help">以后有新成员进群，只添加她的 QQ 即可，不需要单独生成验证码。</p>
    <form id="addForm" class="row">
      <input id="addQq" inputmode="numeric" maxlength="12" placeholder="输入成员 QQ 号" required>
      <button id="addButton" type="submit">添加成员</button>
    </form>
    <p id="addMessage" class="msg"></p>
  </section>

  <section class="panel">
    <h2>成员名单</h2>
    <p class="help">换手机或换浏览器时点“重置设备”；退群时点“删除”。</p>
    <div class="toolbar">
      <form id="searchForm">
        <input id="searchQq" inputmode="numeric" maxlength="12" placeholder="搜索 QQ 号">
        <button type="submit" class="secondary">搜索</button>
      </form>
      <span id="memberCount" class="count">0 位成员</span>
    </div>
    <p id="listMessage" class="msg"></p>
    <div id="memberList" class="member-list"></div>
  </section>
</main>

<script>
const loginPanel=document.getElementById('loginPanel');
const managePanel=document.getElementById('managePanel');
const adminLoginForm=document.getElementById('adminLoginForm');
const adminPassword=document.getElementById('adminPassword');
const adminLoginButton=document.getElementById('adminLoginButton');
const adminLoginMessage=document.getElementById('adminLoginMessage');
const logoutButton=document.getElementById('logoutButton');

const codeStatus=document.getElementById('codeStatus');
const groupCode=document.getElementById('groupCode');
const generateCodeButton=document.getElementById('generateCodeButton');
const copyCodeButton=document.getElementById('copyCodeButton');
const saveCodeButton=document.getElementById('saveCodeButton');
const codeMessage=document.getElementById('codeMessage');

const bulkQqs=document.getElementById('bulkQqs');
const bulkButton=document.getElementById('bulkButton');
const bulkMessage=document.getElementById('bulkMessage');

const addForm=document.getElementById('addForm');
const addQq=document.getElementById('addQq');
const addButton=document.getElementById('addButton');
const addMessage=document.getElementById('addMessage');

const searchForm=document.getElementById('searchForm');
const searchQq=document.getElementById('searchQq');
const memberCount=document.getElementById('memberCount');
const listMessage=document.getElementById('listMessage');
const memberList=document.getElementById('memberList');

init();

async function init(){
  try{
    const response=await fetch('/api/admin/session',{cache:'no-store'});
    const data=await response.json().catch(()=>({}));
    data.authenticated?showManage():showLogin();
  }catch{showLogin()}
}

adminLoginForm.addEventListener('submit',async(event)=>{
  event.preventDefault();setMessage(adminLoginMessage,'');adminLoginButton.disabled=true;adminLoginButton.textContent='正在登录';
  try{
    const response=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:adminPassword.value})});
    const data=await response.json().catch(()=>({}));
    if(!response.ok||!data.ok) throw new Error(data.error||'登录失败。');
    adminPassword.value='';showManage();
  }catch(error){setMessage(adminLoginMessage,error.message||'登录失败。')}
  finally{adminLoginButton.disabled=false;adminLoginButton.textContent='进入成员管理'}
});

logoutButton.addEventListener('click',async()=>{await fetch('/api/admin/logout',{method:'POST'}).catch(()=>{});showLogin()});

groupCode.addEventListener('input',()=>{
  const raw=groupCode.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,24);
  groupCode.value=raw.match(/.{1,4}/g)?.join('-')||'';
});

generateCodeButton.addEventListener('click',()=>{
  const alphabet='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const bytes=crypto.getRandomValues(new Uint8Array(10));
  const raw=Array.from(bytes,byte=>alphabet[byte%alphabet.length]).join('');
  groupCode.value=raw.match(/.{1,4}/g).join('-');
  setMessage(codeMessage,'已生成。保存后再复制到群公告。',true);
});

copyCodeButton.addEventListener('click',async()=>{
  if(!groupCode.value){setMessage(codeMessage,'输入框里还没有访问码。');return}
  try{await navigator.clipboard.writeText(groupCode.value);setMessage(codeMessage,'已复制当前输入。',true)}
  catch{setMessage(codeMessage,'复制失败，请长按输入框手动复制。')}
});

saveCodeButton.addEventListener('click',async()=>{
  setMessage(codeMessage,'');saveCodeButton.disabled=true;
  try{
    const response=await fetch('/api/admin/settings/access-code',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessCode:groupCode.value})});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'保存失败。');
    setMessage(codeMessage,'群访问码已保存。请把当前输入发到群公告。',true);await loadCodeStatus();
  }catch(error){setMessage(codeMessage,error.message||'保存失败。')}
  finally{saveCodeButton.disabled=false}
});

bulkButton.addEventListener('click',async()=>{
  setMessage(bulkMessage,'');bulkButton.disabled=true;bulkButton.textContent='正在导入';
  try{
    const response=await fetch('/api/admin/members/bulk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qqs:bulkQqs.value})});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'导入失败。');
    const extra=[];
    if(data.existed) extra.push(`${data.existed} 个已存在`);
    if(data.duplicates) extra.push(`${data.duplicates} 个重复`);
    if(data.invalid) extra.push(`${data.invalid} 个无效`);
    setMessage(bulkMessage,`已新增 ${data.added} 位成员${extra.length?'，'+extra.join('，'):''}。`,true);
    bulkQqs.value='';await loadMembers();
  }catch(error){setMessage(bulkMessage,error.message||'导入失败。')}
  finally{bulkButton.disabled=false;bulkButton.textContent='批量导入 QQ'}
});

addQq.addEventListener('input',()=>{addQq.value=addQq.value.replace(/\D/g,'').slice(0,12)});
searchQq.addEventListener('input',()=>{searchQq.value=searchQq.value.replace(/\D/g,'').slice(0,12)});

addForm.addEventListener('submit',async(event)=>{
  event.preventDefault();setMessage(addMessage,'');addButton.disabled=true;
  try{
    const response=await fetch('/api/admin/members',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq:addQq.value})});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'添加失败。');
    addQq.value='';setMessage(addMessage,'成员已添加。',true);await loadMembers();
  }catch(error){setMessage(addMessage,error.message||'添加失败。')}
  finally{addButton.disabled=false}
});

searchForm.addEventListener('submit',(event)=>{event.preventDefault();loadMembers(searchQq.value)});

function showLogin(){loginPanel.style.display='block';managePanel.style.display='none'}
function showManage(){loginPanel.style.display='none';managePanel.style.display='block';loadCodeStatus();loadMembers()}

async function loadCodeStatus(){
  codeStatus.textContent='正在读取';
  try{
    const response=await fetch('/api/admin/settings/access-code',{cache:'no-store'});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'读取失败。');
    codeStatus.textContent=data.configured?'已设置':'尚未设置';
  }catch{codeStatus.textContent='读取失败'}
}

async function loadMembers(query=''){
  setMessage(listMessage,'');memberList.innerHTML='<div class="empty">正在读取</div>';
  try{
    const response=await fetch('/api/admin/members?q='+encodeURIComponent(query),{cache:'no-store'});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'读取失败。');
    memberCount.textContent=`${data.total} 位成员`;renderMembers(data.members||[]);
  }catch(error){memberList.innerHTML='';setMessage(listMessage,error.message||'读取失败。')}
}

function renderMembers(members){
  if(!members.length){memberList.innerHTML='<div class="empty">没有找到成员</div>';return}
  memberList.innerHTML='';
  for(const member of members){
    const item=document.createElement('div');item.className='member';
    const main=document.createElement('div');main.className='member-main';
    const qq=document.createElement('div');qq.className='member-qq';qq.textContent=member.qq;
    const meta=document.createElement('div');meta.className='member-meta';
    const bound=member.deviceBound?'已绑定设备':'未绑定设备';
    const created=formatTime(member.createdAt);const last=member.lastLoginAt?formatTime(member.lastLoginAt):'尚未登录';
    meta.textContent=`${bound} · 添加 ${created} · 最近登录 ${last}`;
    const actions=document.createElement('div');actions.className='member-actions';
    const reset=document.createElement('button');reset.type='button';reset.className='secondary small';reset.textContent='重置设备';
    reset.addEventListener('click',()=>resetDevice(member.qq,reset));
    const remove=document.createElement('button');remove.type='button';remove.className='danger small';remove.textContent='删除';
    remove.addEventListener('click',()=>removeMember(member.qq,remove));
    main.append(qq,meta);actions.append(reset,remove);item.append(main,actions);memberList.append(item);
  }
}

async function resetDevice(qq,button){
  if(!confirm(`确定重置 QQ ${qq} 的设备？\n她当前会退出，下次可在新手机或浏览器重新绑定。`)) return;
  button.disabled=true;
  try{
    const response=await fetch('/api/admin/members/'+encodeURIComponent(qq)+'/reset-device',{method:'POST'});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'重置失败。');
    await loadMembers(searchQq.value);
  }catch(error){setMessage(listMessage,error.message||'重置失败。');button.disabled=false}
}

async function removeMember(qq,button){
  if(!confirm(`确定删除 QQ ${qq}？\n删除后该成员刷新页面就会失效。`)) return;
  button.disabled=true;
  try{
    const response=await fetch('/api/admin/members/'+encodeURIComponent(qq),{method:'DELETE'});
    const data=await response.json().catch(()=>({}));
    if(response.status===401){showLogin();return}
    if(!response.ok||!data.ok) throw new Error(data.error||'删除失败。');
    await loadMembers(searchQq.value);
  }catch(error){setMessage(listMessage,error.message||'删除失败。');button.disabled=false}
}

function formatTime(seconds){
  if(!seconds)return'—';
  return new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(seconds*1000));
}
function setMessage(element,text,ok=false){element.textContent=text;element.classList.toggle('ok',ok);element.style.display=text?'block':'none'}
</script>
</body>
</html>
