<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bunny Room</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f6f6f5;
  --card:#fff;
  --text:#20242a;
  --sub:#7d838c;
  --light:#aeb4bd;
  --line:#eceef1;
  --shadow:0 12px 30px rgba(42,47,56,.045);
  --radius:24px;
}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;}
body{padding:18px 12px 48px;}
.main{max-width:720px;margin:0 auto;}
.shell{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.header{padding:20px 20px 22px;}
.back{display:inline-flex;text-decoration:none;color:var(--sub);font-size:11px;margin-bottom:16px;}
.archive-title{margin:0;font-size:34px;line-height:1.05;letter-spacing:-.065em;font-weight:850;}
.archive-sub{margin:14px 0 0;color:var(--sub);font-size:13px;line-height:1.8;font-weight:650;}
.search-card{padding:14px;}
.search-row{display:flex;gap:8px;}
#themeSearch{flex:1;height:42px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:0 14px;outline:none;color:var(--text);font-size:16px;}
#themeSearch::placeholder{color:#b5bbc3;font-size:12px;}
.clear-btn{width:60px;height:42px;border:1px solid var(--line);border-radius:999px;background:#f8f9fa;color:#8d949e;font-size:11px;font-weight:700;}
.result-count{margin:10px 0 0 5px;color:var(--light);font-size:11px;letter-spacing:.04em;font-weight:650;}
.theme-card{padding:17px;}
.theme-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.theme-name{margin:0;font-size:28px;font-weight:850;letter-spacing:-.06em;line-height:1.05;}
.theme-alt{margin:8px 0 0;color:var(--sub);font-size:13px;font-weight:700;}
.theme-no{font-size:12px;color:var(--light);font-family:Georgia,"Times New Roman",serif;padding-top:4px;}
.keywords{display:flex;gap:7px;flex-wrap:wrap;margin-top:17px;}
.keyword{padding:5px 9px;border-radius:999px;background:#fafafa;border:1px solid var(--line);color:#8b929b;font-size:11px;font-weight:700;}
.micro{margin-top:16px;color:#8b9098;font-size:12px;line-height:1.8;font-weight:650;}
.preview-image-wrap{margin-top:16px;border:1px solid var(--line);border-radius:20px;background:#fff;overflow:hidden;}
.preview-image-wrap img{display:block;width:100%;height:auto;filter:saturate(.95) brightness(1.01);}
.preview-missing{margin-top:16px;border:1px dashed #dfe3e8;border-radius:20px;background:#fbfbfc;color:#a4abb4;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;line-height:1.8;font-weight:700;padding:20px;}
.action-row{display:flex;gap:9px;margin-top:14px;}
.btn{appearance:none;border:none;border-radius:999px;min-height:40px;padding:0 16px;font-size:12px;font-weight:800;cursor:pointer;}
.btn.copy{background:#16191e;color:#fff;flex:1;}
.btn.open{background:#f4f7fb;color:#88a3ca;border:1px solid #e2ebf7;flex:1;}
.code-wrap{display:none;margin-top:13px;}
.code-wrap.open{display:block;}
.code-head{font-size:10px;color:var(--light);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
textarea{width:100%;min-height:260px;border-radius:18px;border:1px solid var(--line);background:#fbfbfc;color:#2b3036;padding:13px;font-size:10px;line-height:1.65;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}
.footer{text-align:center;color:#bcc2ca;font-size:10px;padding:4px 0 0;line-height:1.8;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);opacity:0;background:#16191e;color:#fff;font-size:11px;padding:10px 13px;border-radius:999px;pointer-events:none;transition:.22s ease;z-index:99;box-shadow:0 8px 20px rgba(0,0,0,.12);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="main">
  <div class="shell">
    <section class="card header">
      <a class="back" href="index.html">← back home</a>
      <h1 class="archive-title">Bunny Room</h1>
      <p class="archive-sub">来自天国事务所小兔们的美化主题。请尊重每一位小兔的创作，禁止搬运、倒卖及二次发布。</p>
    </section>

    <section class="card search-card">
      <div class="search-row">
        <input id="themeSearch" type="search" placeholder="搜索：主题名 / 小兔名 / 标签 / 330" autocomplete="off" />
        <button class="clear-btn" type="button" onclick="clearThemeSearch()">清空</button>
      </div>
      <div class="result-count" id="resultCount">loading...</div>
    </section>

    <div id="themeList" class="shell"></div>

    <div class="footer">for personal use only · repost / resale prohibited</div>
  </div>
</div>

<div class="toast" id="toast">已复制</div>

<script>
const repoOwner = 'angelcssroom';
const repoName = 'cloud-room';
const branch = 'main';

const themeList = document.getElementById('themeList');
const search = document.getElementById('themeSearch');
const count = document.getElementById('resultCount');
let themes = [];

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}
function slugToTitle(slug){
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function rawUrl(fileName){
  return `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${encodeURIComponent(fileName)}`;
}
async function fetchTextFile(fileName){
  const res = await fetch(rawUrl(fileName) + '?v=' + Date.now());
  if(!res.ok) throw new Error('file not found: ' + fileName);
  return await res.text();
}
function parseInfo(text, slug){
  const get = key => {
    const m = text.match(new RegExp('^\\\\s*' + key + '\\\\s*[:：]\\\\s*(.+)$', 'im'));
    return m ? m[1].trim() : '';
  };
  const title = get('title') || slugToTitle(slug);
  const author = get('author') || '小兔';
  const tagsRaw = get('tags') || '';
  const note = get('note') || '';
  const tags = tagsRaw ? tagsRaw.split(/[\\/、,，|]+/).map(x => x.trim()).filter(Boolean) : [];
  return {title, author, tags, note};
}

function renderThemes(list){
  themeList.innerHTML = '';
  list.forEach((theme, index) => {
    const tagsHtml = theme.tags.map(t => `<span class="keyword">${escapeHtml(t)}</span>`).join('');
    const article = document.createElement('article');
    article.className = 'card theme-card';
    article.dataset.search = theme.searchText;
    article.innerHTML = `
      <div class="theme-top">
        <div>
          <h3 class="theme-name">${escapeHtml(theme.title)}</h3>
          <p class="theme-alt">🐇 ${escapeHtml(theme.author)}</p>
        </div>
        <div class="theme-no">${String(index + 1).padStart(2, '0')}</div>
      </div>
      ${tagsHtml ? `<div class="keywords">${tagsHtml}</div>` : ''}
      ${theme.note ? `<div class="micro">${escapeHtml(theme.note)}</div>` : ''}
      ${theme.previewFile ? `
      <div class="preview-image-wrap">
        <img src="${escapeHtml(theme.previewFile)}" alt="${escapeHtml(theme.title)} preview" onerror="this.closest('.preview-image-wrap').outerHTML='<div class=&quot;preview-missing&quot;>预览图暂时没加载出来<br>CSS 仍然可以复制</div>'" />
      </div>` : `
      <div class="preview-missing">没有找到同名预览图<br>请检查 preview-community-${escapeHtml(theme.slug)}.jpg</div>`}
      <div class="action-row">
        <button class="btn copy" type="button" onclick="copyFile('${escapeHtml(theme.cssFile)}')">复制全部代码</button>
        <button class="btn open" type="button" onclick="previewFile('${escapeHtml(theme.cssFile)}','wrap-${escapeHtml(theme.slug)}','area-${escapeHtml(theme.slug)}')">展开代码</button>
      </div>
      <div class="code-wrap" id="wrap-${escapeHtml(theme.slug)}">
        <div class="code-head">external css / ${escapeHtml(theme.cssFile)}</div>
        <textarea id="area-${escapeHtml(theme.slug)}" readonly></textarea>
      </div>
    `;
    themeList.appendChild(article);
  });
  count.textContent = list.length + ' result' + (list.length === 1 ? '' : 's');
}
function updateThemeSearch(){
  const q = search.value.trim().toLowerCase();
  const list = !q ? themes : themes.filter(t => t.searchText.toLowerCase().includes(q));
  renderThemes(list);
}
function clearThemeSearch(){
  search.value = '';
  search.blur();
  updateThemeSearch();
}
search.addEventListener('input', updateThemeSearch);

async function copyFile(fileName){
  try{
    const text = await fetchTextFile(fileName);
    await navigator.clipboard.writeText(text);
    showToast('已复制全部代码');
  }catch(err){
    showToast('复制失败，请检查 CSS 文件名');
    console.error(err);
  }
}
async function previewFile(fileName, wrapId, areaId){
  const wrap = document.getElementById(wrapId);
  const area = document.getElementById(areaId);
  try{
    if(!area.value) area.value = await fetchTextFile(fileName);
    wrap.classList.toggle('open');
  }catch(err){
    showToast('展开失败，请检查 CSS 文件名');
    console.error(err);
  }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1500);
}
async function loadThemes(){
  try{
    const api = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/?ref=${branch}`;
    let res = await fetch(api + '&v=' + Date.now());
    if(!res.ok){
      await new Promise(r => setTimeout(r, 1200));
      res = await fetch(api + '&v=' + Date.now());
    }
    if(!res.ok) throw new Error('repo contents failed');
    const files = await res.json();
    const names = files.map(f => f.name);
    const cssNames = names.filter(n => /^css-community-.+\.txt$/i.test(n)).sort();

    const loaded = [];
    for(const cssFile of cssNames){
      const slug = cssFile.replace(/^css-community-/i, '').replace(/\.txt$/i, '');
      const previewFile = names.find(n => new RegExp('^preview-community-' + slug.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\.(jpg|jpeg|png|webp)$', 'i').test(n)) || '';
      const infoFile = names.find(n => new RegExp('^info-community-' + slug.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\.txt$', 'i').test(n)) || '';
      let meta = {title: slugToTitle(slug), author: '小兔', tags: [], note: ''};
      if(infoFile){
        try{
          meta = parseInfo(await fetchTextFile(infoFile), slug);
        }catch(e){}
      }
      loaded.push({
        slug, cssFile, previewFile,
        title: meta.title, author: meta.author, tags: meta.tags, note: meta.note,
        searchText: [meta.title, meta.author, meta.tags.join(' '), meta.note, slug].join(' ')
      });
    }
    themes = loaded;
    renderThemes(themes);
  }catch(err){
    count.textContent = 'refreshing needed';
    themeList.innerHTML = '<section class="card theme-card"><div class="micro">GitHub 还没刷新出来。等半分钟后重新打开页面，或者在网址后面换一个 ?v=数字。</div></section>';
    console.error(err);
  }
}
loadThemes();
</script>
</body>
</html>
