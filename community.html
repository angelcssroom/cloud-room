<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><title>Bunny Room</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f6f6f5;--card:#fff;--text:#20242a;--sub:#7d838c;--light:#aeb4bd;--line:#eceef1;--blue-deep:#8ea8cf;--shadow:0 12px 30px rgba(42,47,56,.045);--radius:24px;}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
body{padding:22px 14px 52px}.main{max-width:720px;margin:0 auto}.shell{display:flex;flex-direction:column;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.footer{text-align:center;color:#bcc2ca;font-size:10px;padding:4px 0 0;line-height:1.8}
.header{padding:19px}.back{display:inline-flex;text-decoration:none;color:var(--sub);font-size:11px;margin-bottom:14px}.archive-title{margin:0;font-size:22px;letter-spacing:-.035em}.archive-sub{margin:7px 0 0;color:var(--sub);font-size:11px;line-height:1.7}
.search-card{padding:14px}.search-row{display:flex;gap:8px}#themeSearch{flex:1;height:40px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:0 13px;outline:none;color:var(--text);font-size:16px}#themeSearch::placeholder{color:#b5bbc3;font-size:12px}.clear-btn{width:60px;height:40px;border:1px solid var(--line);border-radius:999px;background:#f8f9fa;color:#8d949e;font-size:11px}.result-count{margin:8px 0 0 4px;color:var(--light);font-size:10px;letter-spacing:.04em}
.theme-card{padding:16px}.theme-card.hidden{display:none}.theme-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.theme-name{margin:0;font-size:20px;font-weight:760;letter-spacing:-.03em}.theme-alt{margin:5px 0 0;color:var(--sub);font-size:11px}.theme-no{font-size:11px;color:var(--light);font-family:Georgia,"Times New Roman",serif;padding-top:4px}.keywords{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}.keyword{padding:4px 7px;border-radius:999px;background:#f8f9fa;border:1px solid var(--line);color:#8b929b;font-size:9.5px}.micro{margin-top:11px;color:#8b9098;font-size:10px;line-height:1.75}
.preview-image-wrap,.variant-preview{margin-top:13px;border:1px solid var(--line);border-radius:19px;background:#fff;overflow:hidden}.preview-image-wrap img,.variant-preview img{display:block;width:100%;height:auto;filter:saturate(.92) brightness(1.02)}
.action-row{display:flex;gap:9px;margin-top:14px}.btn{appearance:none;border:none;border-radius:999px;min-height:39px;padding:0 16px;font-size:12px;font-weight:700;cursor:pointer}.btn.copy{background:#16191e;color:#fff;flex:1}.btn.open{background:#f4f7fb;color:#88a3ca;border:1px solid #e2ebf7;flex:1}
.code-wrap{display:none;margin-top:13px}.code-wrap.open{display:block}.code-head{font-size:10px;color:var(--light);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}textarea{width:100%;min-height:280px;border-radius:18px;border:1px solid var(--line);background:#fbfbfc;color:#2b3036;padding:13px;font-size:10px;line-height:1.65;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.variant-list{display:flex;flex-direction:column;gap:14px;margin-top:14px}.variant{border:1px solid var(--line);border-radius:20px;background:#fff;padding:12px}.variant.hidden{display:none}.variant-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.variant-head h4{margin:0;font-size:14px}.variant-head p{margin:4px 0 0;color:var(--light);font-size:10px}.variant-head span{font-size:10px;color:#8c949f;background:#f8f9fa;border:1px solid var(--line);padding:5px 8px;border-radius:999px}
.template-note{padding:15px 16px;color:var(--sub);font-size:11px;line-height:1.9}.template-note code{font-size:10px;background:#f8f9fa;border:1px solid var(--line);border-radius:6px;padding:1px 4px;color:#555b64}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);opacity:0;background:#16191e;color:#fff;font-size:11px;padding:10px 13px;border-radius:999px;pointer-events:none;transition:.22s ease;z-index:99}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:560px){body{padding:18px 12px 42px}.action-row{flex-direction:column}.btn{width:100%}}</style></head><body><div class="main"><div class="shell">
<section class="card header"><a class="back" href="index.html">← back home</a><h1 class="archive-title">Bunny Room</h1><p class="archive-sub">来自天国事务所小兔们的美化主题。请尊重每一位小兔的创作，禁止搬运、倒卖及二次发布。</p></section>
<section class="card search-card"><div class="search-row"><input id="themeSearch" type="search" placeholder="搜索：主题名 / 小兔名 / 标签 / 330" autocomplete="off"/><button class="clear-btn" type="button" onclick="clearThemeSearch()">清空</button></div><div class="result-count" id="resultCount">1 result</div></section>
<!-- 小兔主题已添加在这里。新增主题时，复制下面任意一整段 article 卡片，粘贴到 footer 上面。 -->
<article class="card theme-card" data-search="Tempest's Whisper tempests whisper 芷 简约 低饱和 330 小兔 天国事务所">
  <div class="theme-top">
    <div>
      <h3 class="theme-name">Tempest's Whisper</h3>
      <p class="theme-alt">🐇 芷</p>
    </div>
    <div class="theme-no">01</div>
  </div>

  <div class="keywords">
    <span class="keyword">简约</span>
    <span class="keyword">低饱和</span>
    <span class="keyword">330</span>
  </div>

  <div class="micro">这个什么屌丝几百年前美化呵呵</div>

  <div class="preview-image-wrap">
    <img src="preview-community-tempests-whisper.jpg" alt="Tempest's Whisper preview" />
  </div>

  <div class="action-row">
    <button class="btn copy" type="button" onclick="copyFile('css-community-tempests-whisper.txt')">复制全部代码</button>
    <button class="btn open" type="button" onclick="previewFile('css-community-tempests-whisper.txt','wrap-community-tempests-whisper','area-community-tempests-whisper')">展开代码</button>
  </div>

  <div class="code-wrap" id="wrap-community-tempests-whisper">
    <div class="code-head">external css / css-community-tempests-whisper.txt</div>
    <textarea id="area-community-tempests-whisper" readonly></textarea>
  </div>
</article>
<div class="footer">for personal use only · repost / resale prohibited</div></div></div><div class="toast" id="toast">已复制</div><script>const search=document.getElementById('themeSearch');const cards=Array.from(document.querySelectorAll('.theme-card'));const count=document.getElementById('resultCount');const colorGroups={yellow:['黄','黄色','yellow'],blue:['蓝','蓝色','blue'],purple:['紫','紫色','purple'],pink:['粉','粉色','pink'],black:['黑','黑色','black']};
function detectColorQuery(q){if(!q)return null;for(const [c,ws] of Object.entries(colorGroups)){if(ws.some(w=>q.includes(w.toLowerCase())))return c;}return null;}
function updateThemeSearch(){const q=search.value.trim().toLowerCase();const colorQuery=detectColorQuery(q);let visible=0;cards.forEach(card=>{const hay=card.dataset.search.toLowerCase();const variants=Array.from(card.querySelectorAll('.variant'));if(!q){card.classList.remove('hidden');variants.forEach(v=>v.classList.remove('hidden'));visible++;return;}if(variants.length){let shown=0;variants.forEach(v=>{const vc=v.dataset.color.toLowerCase();let ok=colorQuery?vc.includes(colorQuery):hay.includes(q);v.classList.toggle('hidden',!ok);if(ok)shown++;});const show=shown>0||(!colorQuery&&hay.includes(q));card.classList.toggle('hidden',!show);if(show){if(!colorQuery&&shown===0)variants.forEach(v=>v.classList.remove('hidden'));visible++;}return;}const ok=hay.includes(q);card.classList.toggle('hidden',!ok);if(ok)visible++;});count.textContent=visible+' result'+(visible===1?'':'s');}
function clearThemeSearch(){search.value='';search.blur();updateThemeSearch();}if(search)search.addEventListener('input',updateThemeSearch);
async function fetchTextFile(fileName){const res=await fetch(fileName+'?v='+Date.now());if(!res.ok)throw new Error('file not found: '+fileName);return await res.text();}
async function copyFile(fileName){try{const text=await fetchTextFile(fileName);await navigator.clipboard.writeText(text);showToast('已复制全部代码');}catch(err){showToast('复制失败，请检查文件名');console.error(err);}}
async function previewFile(fileName,wrapId,areaId){const wrap=document.getElementById(wrapId);const area=document.getElementById(areaId);try{if(!area.value)area.value=await fetchTextFile(fileName);wrap.classList.toggle('open');}catch(err){showToast('展开失败，请检查文件名');console.error(err);}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.classList.remove('show'),1500);}updateThemeSearch();</script></body></html>
