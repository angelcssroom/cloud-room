<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light only">
<title>Bubble Studio · 天国事务所</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1c1c1e;--gray:#77777c;--light:#a8a8ad;--line:#e8e8ea;--soft:#fafafa;
  --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","PingFang SC",Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
html{background:#fff;scroll-behavior:smooth;color-scheme:light only}
body{margin:0;min-height:100vh;background:#fff;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
button,input{font:inherit} button,a{color:inherit} button{touch-action:manipulation}
.page{width:min(100%,720px);min-height:100vh;margin:0 auto;padding:12px 16px calc(50px + env(safe-area-inset-bottom))}
.top{height:44px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.back{justify-self:start;color:#808084;text-decoration:none;font-size:10px}
.page-name{margin:0;font-size:13px;line-height:1;font-weight:550}
.top-links{justify-self:end;display:flex;gap:12px}
.top-links a{color:#99999e;text-decoration:none;font-size:7px;border-bottom:1px solid #ddd;padding-bottom:2px}
.intro{position:relative;padding:74px 0 54px;overflow:hidden}
.kicker{display:block;color:#a1a1a6;font:6px/1 var(--mono);letter-spacing:.22em;text-transform:uppercase}
.intro h1{margin:12px 0 0;font-size:29px;line-height:1.05;font-weight:400;letter-spacing:-.055em}
.intro p{width:min(82%,430px);margin:17px 0 0;color:#85858a;font-size:9px;line-height:1.85}
.workspace{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(250px,.92fr);gap:18px;align-items:start}
.preview-panel,.controls{border:1px solid var(--line);background:#fff;box-shadow:0 14px 38px rgba(0,0,0,.032)}
.preview-panel{position:sticky;top:12px;padding:17px;border-radius:30px 10px 30px 10px}
.panel-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-label span:first-child{font-size:9px;font-weight:570}
.panel-label span:last-child{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.15em}
.phone{
  position:relative;
  aspect-ratio:9/15.2;
  overflow:hidden;
  border:1px solid #d9d9dc;
  border-radius:27px;
  background:#000;
  box-shadow:0 17px 38px rgba(0,0,0,.09);
}
.phone-top{
  height:45px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:#f5f5f6;
  border:0;
  background:#0b0c0e;
  font-size:8px;
}
.phone-top b{font-size:10px;font-weight:560}
.messages{
  position:absolute;
  inset:45px 0 49px;
  padding:25px 13px 22px;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:hidden;
  background:#000;
}
.row{
  display:flex;
  align-items:flex-end;
  gap:8px;
  max-width:88%;
} .row.char{align-self:flex-start} .row.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{
  width:27px;
  height:27px;
  flex:none;
  border:1px solid #3a3c43;
  border-radius:42% 42% 38% 38% / 36% 36% 44% 44%;
  background:linear-gradient(145deg,#747985,#24262b);
}
.bubble{
  position:relative;
  padding:7px 13px;
  border:0;
  border-radius:22px;
  font-size:8.5px;
  line-height:1.38;
  box-shadow:none;
  color:#fff;
  transition:background .22s ease,color .22s ease;
  overflow:visible;
}
.bubble::after{
  content:"";
  position:absolute;
  bottom:-1px;
  width:18px;
  height:18px;
  background:inherit;
  background-color:inherit;
  -webkit-mask-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20200'%3E%3Cpath%20fill='%238fb2c8'%20d='M34%209L33%2010L33%2088L32%2089L32%2099L33%20100L33%20107L32%20109L33%20110L34%20120L35%20121L35%20124L36%20125L38%20133L43%20143L45%20145L47%20150L50%20153L50%20154L61%20165L62%20165L66%20169L67%20169L72%20173L75%20174L77%20176L79%20176L93%20183L95%20183L99%20185L107%20186L108%20187L114%20187L115%20188L120%20188L121%20189L126%20189L127%20190L137%20190L138%20189L144%20189L145%20188L149%20188L151%20186L151%20185L148%20184L140%20177L139%20177L133%20171L133%20170L130%20167L130%20166L126%20161L120%20149L120%20147L119%20146L119%20144L118%20143L118%20141L116%20137L116%20134L115%20133L114%20123L113%20122L113%20113L112%20112L112%2098L111%2097L112%2096L112%2085L111%2084L111%2078L112%2077L112%2061L111%2060L112%2059L112%2014L113%2013L113%2010L109%2010L108%209Z'/%3E%3C/svg%3E");
  mask-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20200'%3E%3Cpath%20fill='%238fb2c8'%20d='M34%209L33%2010L33%2088L32%2089L32%2099L33%20100L33%20107L32%20109L33%20110L34%20120L35%20121L35%20124L36%20125L38%20133L43%20143L45%20145L47%20150L50%20153L50%20154L61%20165L62%20165L66%20169L67%20169L72%20173L75%20174L77%20176L79%20176L93%20183L95%20183L99%20185L107%20186L108%20187L114%20187L115%20188L120%20188L121%20189L126%20189L127%20190L137%20190L138%20189L144%20189L145%20188L149%20188L151%20186L151%20185L148%20184L140%20177L139%20177L133%20171L133%20170L130%20167L130%20166L126%20161L120%20149L120%20147L119%20146L119%20144L118%20143L118%20141L116%20137L116%20134L115%20133L114%20123L113%20122L113%20113L112%20112L112%2098L111%2097L112%2096L112%2085L111%2084L111%2078L112%2077L112%2061L111%2060L112%2059L112%2014L113%2013L113%2010L109%2010L108%209Z'/%3E%3C/svg%3E");
  -webkit-mask-size:contain;
  mask-size:contain;
  -webkit-mask-position:center;
  mask-position:center;
  -webkit-mask-repeat:no-repeat;
  mask-repeat:no-repeat;
  pointer-events:none;
}
.char .bubble::after{left:-7px;right:auto;transform:scaleX(-1)} .user .bubble::after{right:-7px;left:auto;transform:scaleX(1)}
.phone-input{
  position:absolute;
  left:0;right:0;bottom:0;
  height:49px;
  padding:8px 10px 8px 44px;
  display:flex;
  align-items:center;
  gap:8px;
  border:0;
  background:#0b0c0e;
}
.fake-input{
  height:31px;
  flex:1;
  border:1px solid #343740;
  border-radius:999px;
  background:#17181b;
}
.send{
  width:25px;
  height:25px;
  border:1px solid #c7c7c7;
  border-radius:50%;
  background:#d9d9d9;
}
.controls{padding:18px;border-radius:10px 30px 10px 30px}
.control-group{padding:0 0 18px;margin-bottom:18px;border-bottom:1px solid #efeff0}
.control-group:last-of-type{margin-bottom:0}
.control-title{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.control-title strong{font-size:10px;font-weight:570} .control-title span{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase}
.segment{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.segment button{height:31px;border:1px solid #e4e4e6;border-radius:9px;background:#fff;color:#7b7b80;font-size:7px}
.segment button.active{background:#202024;border-color:#202024;color:#fff}
.color-line{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:10px}
.color-meta strong{display:block;font-size:8px;font-weight:560} .color-meta span{display:block;margin-top:3px;color:#aaa;font:5.5px/1 var(--mono)}
.color-input{position:relative;width:34px;height:34px;border:1px solid #dddde0;border-radius:50%;overflow:hidden;background:#fff}
.color-input input{position:absolute;inset:-7px;width:48px;height:48px;padding:0;border:0;cursor:pointer}
.swatches{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.swatch{width:20px;height:20px;padding:0;border:1px solid rgba(0,0,0,.12);border-radius:50%;background:var(--c);box-shadow:inset 0 0 0 2px rgba(255,255,255,.55)}
.swatch.active{outline:1px solid #8d8d92;outline-offset:2px}
.range-line{margin-top:13px;display:grid;grid-template-columns:72px 1fr 28px;gap:8px;align-items:center}
.range-line label{color:#85858a;font-size:7px} .range-line output{text-align:right;color:#8f8f94;font:6px/1 var(--mono)}
input[type="range"]{width:100%;accent-color:#4b4b50}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:18px}
.actions button{height:38px;border:1px solid #e1e1e3;border-radius:999px;background:#fff;color:#747479;font-size:8px}
.actions .primary{background:#202024;border-color:#202024;color:#fff}
.hint{margin:12px 3px 0;color:#aaa;font-size:6.5px;line-height:1.65}
.toast{position:fixed;left:50%;bottom:22px;z-index:20;transform:translate(-50%,10px);padding:9px 12px;border-radius:999px;background:#1d1d1f;color:#fff;opacity:0;pointer-events:none;transition:.18s;font-size:8px}
.toast.show{opacity:1;transform:translate(-50%,0)}
.footer-nav{margin:72px 0 0;padding:24px 0 0;border-top:1px solid #efeff0;display:flex;justify-content:center;gap:22px}
.footer-nav a{color:#77777c;text-decoration:none;font-size:8px;border-bottom:1px solid #d3d3d5;padding-bottom:3px}
@media(max-width:650px){
  .page{padding-left:13px;padding-right:13px}
  .intro{padding-top:60px}
  .workspace{grid-template-columns:1fr;gap:16px}
  .preview-panel{position:relative;top:auto;width:min(90%,390px);margin:0 auto;padding:14px}
  .phone{aspect-ratio:10/14.2;border-radius:24px}
  .controls{border-radius:10px 25px 10px 25px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

.hex-input{width:100%;height:34px;margin-top:9px;padding:0 11px;border:1px solid #e4e4e6;border-radius:10px;background:#fff;color:#4f4f54;outline:none;font:8px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}.hex-input:focus{border-color:#cfcfd2}.hex-input.invalid{border-color:#caaeb2;background:#fffafb}

.char .bubble{background:#2E2F33;color:#fff}
.user .bubble{background:#173FD3;color:#fff}
.row.user .avatar{display:none}
.row.char + .row.char{margin-left:35px}
.row.user + .row.user{margin-right:0}
.char .bubble::after{left:-10px;transform:scaleX(-1)}
.user .bubble::after{right:-10px}


.row.char + .row.char .bubble::after,
.row.user + .row.user .bubble::after{
  content:none;
  display:none;
}


/* 纯颜色预览：不复刻主题，只展示双方气泡颜色。 */
.simple-preview{
  min-height:310px;
  padding:44px 24px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:34px;
  border:1px solid #e8e8ea;
  border-radius:24px 9px 24px 9px;
  background:#fafafa;
}
.simple-row{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-width:78%;
}
.simple-row.char{align-self:flex-start;align-items:flex-start}
.simple-row.user{align-self:flex-end;align-items:flex-end}
.simple-label{
  color:#aaaab0;
  font:5.5px/1 var(--mono);
  letter-spacing:.16em;
}
.simple-preview .bubble{
  position:relative;
  max-width:100%;
  padding:10px 15px;
  border:0;
  border-radius:999px;
  box-shadow:0 8px 20px rgba(0,0,0,.045);
  font-size:9px;
  line-height:1.45;
  transition:background .22s ease,color .22s ease;
}
.simple-preview .bubble::before,
.simple-preview .bubble::after{
  content:none!important;
  display:none!important;
}
@media(max-width:650px){
  .simple-preview{min-height:260px;padding:36px 20px;gap:28px}
  .simple-row{max-width:84%}
}


/* 主题选择：默认收起，只保留当前主题。 */
.theme-select{position:relative;margin:0 0 20px}
.theme-select-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.theme-select-head span:first-child{font-size:9px;font-weight:570}
.theme-select-head span:last-child{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.15em}
.theme-picker{
  position:relative;border:1px solid #e5e5e7;border-radius:14px;background:#fff;
  transition:border-color .16s ease,box-shadow .16s ease;
}
.theme-picker.open{border-color:#cfcfd3;box-shadow:0 10px 26px rgba(0,0,0,.055)}
.theme-current{
  width:100%;min-height:48px;padding:0 13px;border:0;background:transparent;
  display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:10px;text-align:left;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.theme-current:active{background:#fafafa}
.theme-current-number{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.1em}
.theme-current-copy strong{display:block;font-size:9.5px;font-weight:570}
.theme-current-copy small{display:block;margin-top:3px;color:#aaa;font:5.2px/1 var(--mono);letter-spacing:.12em}
.theme-mark{width:14px;height:14px;border:1px solid rgba(0,0,0,.13);border-radius:50%;box-shadow:inset 0 0 0 3px rgba(255,255,255,.72)}
.theme-current[data-theme="night"] .theme-mark,.theme-option[data-theme="night"] .theme-mark{background:#111214}
.theme-current[data-theme="day"] .theme-mark,.theme-option[data-theme="day"] .theme-mark{background:#f3f4f6}
.theme-chevron{width:12px;height:12px;position:relative;transition:transform .18s ease}
.theme-chevron::before,.theme-chevron::after{content:"";position:absolute;top:5px;width:7px;height:1px;background:#777}
.theme-chevron::before{left:0;transform:rotate(40deg)}
.theme-chevron::after{right:0;transform:rotate(-40deg)}
.theme-picker.open .theme-chevron{transform:rotate(180deg)}
.theme-options{
  display:none;padding:5px;border-top:1px solid #efeff0;
}
.theme-picker.open .theme-options{display:block}
.theme-option{
  width:100%;min-height:42px;padding:0 9px;border:0;border-radius:10px;background:transparent;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;text-align:left;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.theme-option:hover,.theme-option:active{background:#f6f6f7}
.theme-option.active{background:#f3f3f4}
.theme-number{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.1em}
.theme-copy strong{display:block;font-size:9px;font-weight:570}
.theme-copy small{display:block;margin-top:3px;color:#aaa;font:5.1px/1 var(--mono);letter-spacing:.12em}
.editor-heading{display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;margin-bottom:17px;border-bottom:1px solid #efeff0}
.editor-heading strong{font-size:10px;font-weight:570}
.editor-heading span{color:#aaa;font:5.5px/1 var(--mono);letter-spacing:.13em}

</style>
</head>
<body>
<main class="page">
  <header class="top">
    <a class="back" href="favorites.html">← 返回收藏</a>
    <h1 class="page-name">Bubble Studio</h1>
    <nav class="top-links" aria-label="页面导航">
      <a href="index.html">首页</a>
      <a href="archive.html">我的区</a>
      <a href="community.html">小兔区</a>
    </nav>
  </header>

  <section class="intro">
    <span class="kicker">bubble studio / 02 available</span>
    <h1>气泡调色室</h1>
    <p>先选择主题，再调整 USER 与 CHAR 的气泡颜色。</p>
  </section>

  <section class="theme-select" aria-label="选择可调色主题">
    <div class="theme-select-head"><span>选择主题</span><span>02 THEMES</span></div>
    <div class="theme-picker" id="themePicker">
      <button class="theme-current" id="themeCurrent" type="button" data-theme="night" aria-expanded="false" aria-controls="themeOptions">
        <span class="theme-current-number" id="themeCurrentNumber">01</span>
        <span class="theme-current-copy"><strong id="themeCurrentName">夜间飞行</strong><small id="themeCurrentEnglish">NIGHT FLIGHT</small></span>
        <span class="theme-mark" aria-hidden="true"></span>
        <span class="theme-chevron" aria-hidden="true"></span>
      </button>
      <div class="theme-options" id="themeOptions" role="tablist" aria-label="可调色主题">
        <button class="theme-option active" type="button" data-theme="night" data-number="01" role="tab" aria-selected="true">
          <span class="theme-number">01</span>
          <span class="theme-copy"><strong>夜间飞行</strong><small>NIGHT FLIGHT</small></span>
          <span class="theme-mark" aria-hidden="true"></span>
        </button>
        <button class="theme-option" type="button" data-theme="day" data-number="02" role="tab" aria-selected="false">
          <span class="theme-number">02</span>
          <span class="theme-copy"><strong>日间飞行</strong><small>DAY FLIGHT</small></span>
          <span class="theme-mark" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </section>

  <section class="workspace">
    <div class="preview-panel">
      <div class="panel-label"><span id="previewTitle">夜间飞行</span><span>LIVE PREVIEW</span></div>
      <div class="simple-preview" id="phonePreview">
        <div class="simple-row char">
          <span class="simple-label">CHAR</span>
          <div class="bubble" id="charBubble">今晚的云层很低。</div>
        </div>
        <div class="simple-row user">
          <span class="simple-label">USER</span>
          <div class="bubble" id="userBubble">那就再飞一会吧。</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="editor-heading"><strong id="editorTitle">夜间飞行</strong><span>COLOR EDITOR</span></div>
<div class="control-group">
        <div class="control-title"><strong>USER 气泡</strong><span>right side</span></div>
        <div class="color-line">
          <div class="color-meta"><strong id="userHex">#173FD3</strong><span>自动文字色</span></div>
          <label class="color-input"><input id="userColor" type="color" value="#173fd3" aria-label="USER 气泡颜色"></label>
        </div>
        <input class="hex-input" id="userHexInput" type="text" maxlength="7" value="#173FD3" aria-label="输入 USER 色值" spellcheck="false">
        <div class="swatches" data-target="user"></div>
      </div>

      <div class="control-group">
        <div class="control-title"><strong>CHAR 气泡</strong><span>left side</span></div>
        <div class="color-line">
          <div class="color-meta"><strong id="charHex">#2E2F33</strong><span>自动文字色</span></div>
          <label class="color-input"><input id="charColor" type="color" value="#2e2f33" aria-label="CHAR 气泡颜色"></label>
        </div>
        <input class="hex-input" id="charHexInput" type="text" maxlength="7" value="#2E2F33" aria-label="输入 CHAR 色值" spellcheck="false">
        <div class="swatches" data-target="char"></div>
      </div>

      <div class="actions">
        <button type="button" id="resetButton">恢复原色</button>
        <button class="primary" type="button" id="copyButton">复制调色版代码</button>
      </div>
      <p class="hint">改好后，点击复制代码。</p>
    </div>
  </section>

  <nav class="footer-nav" aria-label="其他页面">
    <a href="favorites.html">返回收藏</a>
    <a href="index.html">首页</a>
    <a href="archive.html">我的区</a>
    <a href="community.html">小兔区</a>
  </nav>
</main>

function decodeTheme(value) {
  return new TextDecoder().decode(Uint8Array.from(atob(value), c => c.charCodeAt(0)));
}

const THEMES = {
  night: {
    name: "夜间飞行",
    english: "NIGHT FLIGHT",
    baseTheme: decodeTheme(NIGHT_THEME_BASE64),
    defaults: {user:"#173FD3", char:"#2E2F33"},
    preview: {background:"#000000", border:"#232429", label:"#8D9199"},
    palettes: {
      user:["#173FD3","#25262B","#AFCBEA","#E7BBCD","#BFD9C3","#C9BCE2"],
      char:["#2E2F33","#15161A","#D6E4F2","#EED6E0","#D6E6D5","#DED7EC"]
    }
  },
  day: {
    name: "日间飞行",
    english: "DAY FLIGHT",
    baseTheme: decodeTheme(DAY_THEME_BASE64),
    defaults: {user:"#173FD3", char:"#E8E9ED"},
    preview: {background:"#FFFFFF", border:"#E1E3E7", label:"#9A9DA4"},
    palettes: {
      user:["#173FD3","#2E3130","#7FA6E8","#D9AFC2","#AFCDB6","#BCAEDD"],
      char:["#E8E9ED","#F2F3F5","#DCE7F3","#F0DDE5","#DCE9DC","#E5DFF0"]
    }
  }
};

let currentTheme = "night";
const states = Object.fromEntries(Object.entries(THEMES).map(([key,theme]) => [key,{...theme.defaults}]));

const userColor = document.getElementById("userColor");
const charColor = document.getElementById("charColor");
const userHex = document.getElementById("userHex");
const charHex = document.getElementById("charHex");
const userHexInput = document.getElementById("userHexInput");
const charHexInput = document.getElementById("charHexInput");
const userBubble = document.getElementById("userBubble");
const charBubble = document.getElementById("charBubble");
const phonePreview = document.getElementById("phonePreview");
const previewTitle = document.getElementById("previewTitle");
const editorTitle = document.getElementById("editorTitle");
const copyButton = document.getElementById("copyButton");
const themePicker = document.getElementById("themePicker");
const themeCurrent = document.getElementById("themeCurrent");
const themeCurrentNumber = document.getElementById("themeCurrentNumber");
const themeCurrentName = document.getElementById("themeCurrentName");
const themeCurrentEnglish = document.getElementById("themeCurrentEnglish");

function normalizeHex(value) { return value.toUpperCase(); }
function hexToRgb(hex) {
  const n = parseInt(hex.replace("#",""),16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function textFor(hex) {
  const c=hexToRgb(hex);
  return ((0.2126*c.r+0.7152*c.g+0.0722*c.b)/255)>.61 ? "#202126" : "#FFFFFF";
}
function selector(side) {
  return `#chat-interface-screen #chat-messages .message-bubble.${side}:not(.is-transfer):not(.is-voice-message):not(.has-image):not(.is-realimag):not(.is-sticker):not(.is-ai-image):not(.is-waimai-request):not(.is-red-packet):not(.is-poll):not(.is-link-share):not(.is-location-share) .content`;
}
function state() { return states[currentTheme]; }

function renderSwatches() {
  const theme=THEMES[currentTheme];
  document.querySelectorAll(".swatches").forEach(group=>{
    const target=group.dataset.target;
    group.innerHTML=theme.palettes[target].map(color=>
      `<button class="swatch" type="button" style="--c:${color}" data-color="${color}" aria-label="选择 ${color}"></button>`
    ).join("");
  });
}

function applyPreview() {
  const theme=THEMES[currentTheme];
  const values=state();
  userHex.textContent=values.user;
  charHex.textContent=values.char;
  userHexInput.value=values.user;
  charHexInput.value=values.char;
  userColor.value=values.user.toLowerCase();
  charColor.value=values.char.toLowerCase();
  userBubble.style.background=values.user;
  userBubble.style.color=textFor(values.user);
  charBubble.style.background=values.char;
  charBubble.style.color=textFor(values.char);
  phonePreview.style.background=theme.preview.background;
  phonePreview.style.borderColor=theme.preview.border;
  phonePreview.querySelectorAll(".simple-label").forEach(el=>el.style.color=theme.preview.label);
  document.querySelectorAll(".swatches").forEach(group=>{
    const value=group.dataset.target==="user"?values.user:values.char;
    group.querySelectorAll(".swatch").forEach(button=>button.classList.toggle("active",normalizeHex(button.dataset.color)===value));
  });
}

function selectTheme(key) {
  if(!THEMES[key]) return;
  currentTheme=key;
  const theme=THEMES[key];
  document.querySelectorAll(".theme-option").forEach(button=>{
    const active=button.dataset.theme===key;
    button.classList.toggle("active",active);
    button.setAttribute("aria-selected",String(active));
  });
  previewTitle.textContent=theme.name;
  editorTitle.textContent=theme.name;
  copyButton.textContent=`复制${theme.name}代码`;
  const activeButton=document.querySelector(`.theme-option[data-theme="${key}"]`);
  themeCurrent.dataset.theme=key;
  themeCurrentNumber.textContent=activeButton?.dataset.number||"";
  themeCurrentName.textContent=theme.name;
  themeCurrentEnglish.textContent=theme.english;
  themePicker.classList.remove("open");
  themeCurrent.setAttribute("aria-expanded","false");
  renderSwatches();
  applyPreview();
}

function makeOverride() {
  const theme=THEMES[currentTheme];
  const values=state();
  const userText=textFor(values.user), charText=textFor(values.char);
  return `

/* Bubble Studio · ${theme.name} */
:root {
  --night-flight-user-bubble-bg: ${values.user};
  --night-flight-char-bubble-bg: ${values.char};
  --night-flight-user-bubble-text: ${userText};
  --night-flight-char-bubble-text: ${charText};
}
${selector("user")} {background:${values.user}!important;background-color:${values.user}!important;color:${userText}!important;-webkit-text-fill-color:${userText}!important;}
${selector("ai")} {background:${values.char}!important;background-color:${values.char}!important;color:${charText}!important;-webkit-text-fill-color:${charText}!important;}
${selector("user")}::after {background:${values.user}!important;background-color:${values.user}!important;}
${selector("ai")}::after {background:${values.char}!important;background-color:${values.char}!important;}
${selector("user")} *,${selector("ai")} * {color:inherit!important;-webkit-text-fill-color:inherit!important;}
`;
}

function showToast(text) {
  const toast=document.getElementById("toast");
  toast.textContent=text;
  toast.classList.add("show");
  clearTimeout(showToast.t);
  showToast.t=setTimeout(()=>toast.classList.remove("show"),1500);
}

function applyHexInput(input,target) {
  let value=input.value.trim().toUpperCase();
  if(!value.startsWith("#")) value="#"+value;
  if(/^#[0-9A-F]{6}$/.test(value)) {
    input.classList.remove("invalid");
    state()[target]=value;
    applyPreview();
  } else {
    input.classList.add("invalid");
  }
}

themeCurrent.addEventListener("click",()=>{
  const open=themePicker.classList.toggle("open");
  themeCurrent.setAttribute("aria-expanded",String(open));
});
document.querySelectorAll(".theme-option").forEach(button=>button.addEventListener("click",()=>selectTheme(button.dataset.theme)));
document.addEventListener("click",event=>{
  if(themePicker.contains(event.target)) return;
  themePicker.classList.remove("open");
  themeCurrent.setAttribute("aria-expanded","false");
});
userColor.addEventListener("input",()=>{state().user=normalizeHex(userColor.value);applyPreview();});
charColor.addEventListener("input",()=>{state().char=normalizeHex(charColor.value);applyPreview();});
document.querySelector(".controls").addEventListener("click",event=>{
  const button=event.target.closest(".swatch");
  if(!button) return;
  const target=button.closest(".swatches").dataset.target;
  state()[target]=normalizeHex(button.dataset.color);
  applyPreview();
});
userHexInput.addEventListener("change",()=>applyHexInput(userHexInput,"user"));
charHexInput.addEventListener("change",()=>applyHexInput(charHexInput,"char"));
userHexInput.addEventListener("blur",()=>applyHexInput(userHexInput,"user"));
charHexInput.addEventListener("blur",()=>applyHexInput(charHexInput,"char"));

document.getElementById("resetButton").addEventListener("click",()=>{
  states[currentTheme]={...THEMES[currentTheme].defaults};
  applyPreview();
  showToast(`已恢复${THEMES[currentTheme].name}原色`);
});

document.getElementById("copyButton").addEventListener("click",async()=>{
  const theme=THEMES[currentTheme];
  const result=theme.baseTheme.replace(/\s*$/g,"")+"\n"+makeOverride();
  try {
    await navigator.clipboard.writeText(result);
    showToast(`已复制${theme.name}调色版代码`);
  } catch {
    const area=document.createElement("textarea");
    area.value=result;
    area.style.position="fixed";
    area.style.opacity="0";
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    area.remove();
    showToast(`已复制${theme.name}调色版代码`);
  }
});

selectTheme("night");
</script>
</body>
</html>
