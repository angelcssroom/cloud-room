<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cross Archive</title>
<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f6f6f5;
  --card:#ffffff;
  --text:#20242a;
  --sub:#7d838c;
  --light:#aeb4bd;
  --line:#eceef1;
  --blue:#a8bddf;
  --blue-deep:#8ea8cf;
  --soft:#f8f9fa;
  --shadow:0 12px 30px rgba(42,47,56,.045);
  --radius:24px;
}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
body{padding:22px 14px 52px;}
.main{max-width:720px;margin:0 auto;}
.shell{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.footer{text-align:center;color:#bcc2ca;font-size:10px;padding:4px 0 0;}

.hero{padding:28px 22px 23px;text-align:center;}
.avatar{width:96px;height:96px;border-radius:50%;display:block;margin:0 auto 17px;object-fit:cover;filter:saturate(.82) brightness(1.06);box-shadow:0 8px 22px rgba(60,70,90,.06);}
.name-jp{font-size:22px;font-weight:700;letter-spacing:.06em;margin:0;}
.subcopy{margin:9px 0 0;color:var(--sub);font-size:11px;letter-spacing:.02em;}
.eng{margin:20px 0 6px;font-size:13px;font-weight:600;letter-spacing:.02em;}
.meta{margin:4px 0;color:var(--text);font-size:11.5px;line-height:1.8;word-break:break-all;}
.meta small{color:var(--sub);font-size:10px;display:block;margin-top:4px;}
.blue-line{height:1px;background:linear-gradient(90deg, rgba(168,189,223,0), rgba(168,189,223,.75), rgba(168,189,223,0));margin:17px auto 0;max-width:80%;}
.notice{padding:18px 19px 20px;}
.notice-title{font-size:13.5px;font-weight:700;margin:0 0 13px;letter-spacing:.03em;}
.notice-body{color:var(--sub);font-size:11.5px;line-height:1.9;}
.notice-body p{margin:0;}
.notice-body p + p{margin-top:4px;}
.notice-note{margin-top:13px;color:var(--light);font-size:10px;letter-spacing:.04em;}
.gate-link{display:block;text-decoration:none;color:inherit;padding:18px 19px;}
.gate-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.gate-left h3{margin:0;font-size:14px;letter-spacing:.01em;}
.gate-left p{margin:6px 0 0;color:var(--sub);font-size:10.5px;}
.gate-badge{padding:7px 11px;border-radius:999px;background:#f7f8fa;border:1px solid var(--line);color:var(--blue-deep);font-size:10px;font-weight:600;white-space:nowrap;}
.arrow{margin-top:14px;height:1px;background:linear-gradient(90deg,rgba(168,189,223,.75),rgba(168,189,223,0));}
@media (max-width:560px){
 body{padding:18px 12px 42px;}
 .hero{padding:26px 20px 22px;}
 .avatar{width:92px;height:92px;}
}
</style>
</head>
<body>
  <div class="main">
    <div class="shell">
      <section class="card hero">
        <img class="avatar" src="avatar.jpg" alt="avatar" />
        <h1 class="name-jp">天使</h1>
        <p class="subcopy">純観賞用アーカイブ / for viewing only</p>
        <div class="eng">Cross</div>
        <p class="meta">xhs - 63006558821</p>
        <p class="meta">ここは、忘れられた画面の保管室です。<small>soft archive / ios themes / private storage</small></p>
        <div class="blue-line"></div>
      </section>

      <section class="card notice">
        <h2 class="notice-title">ご案内</h2>
        <div class="notice-body">
          <p>禁止商用及搬运，二传。</p>
          <p>都是 iOS 机型的，请自行改适配。</p>
          <p>不受理售后；有 bug 请复制代码发送给 AI 修改，群里管理可帮忙部分答疑。</p>
        </div>
        <div class="notice-note">please read before use</div>
      </section>

      <section class="card">
        <a class="gate-link" href="archive.html">
          <div class="gate-top">
            <div class="gate-left">
              <h3>主题收纳</h3>
              <p>点击进入完整页面 / open archive page</p>
            </div>
            <div class="gate-badge">1 theme</div>
          </div>
          <div class="arrow"></div>
        </a>
      </section>

      <div class="footer">private viewing archive</div>
    </div>
  </div>
</body>
</html>
